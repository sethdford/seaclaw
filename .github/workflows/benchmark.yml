name: Benchmark

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  benchmark:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
    steps:
      - uses: actions/checkout@v6

      - uses: ./.github/actions/setup-build
        with:
          build-type: MinSizeRel
          enable-lto: "true"
          enable-curl: "true"

      - name: Measure binary size
        run: |
          SIZE=$(stat -c%s build/human 2>/dev/null || stat -f%z build/human)
          SIZE_KB=$((SIZE / 1024))
          echo "## Binary Size: ${SIZE_KB} KB" >> $GITHUB_STEP_SUMMARY
          echo "BINARY_SIZE_KB=${SIZE_KB}" >> $GITHUB_ENV

      - name: Check binary size regression
        if: github.event_name == 'pull_request'
        run: |
          MAX_SIZE_KB=1750
          if [ "$BINARY_SIZE_KB" -gt "$MAX_SIZE_KB" ]; then
            echo "::error::Binary size ${BINARY_SIZE_KB}KB exceeds limit of ${MAX_SIZE_KB}KB"
            exit 1
          fi
          echo "Binary size ${BINARY_SIZE_KB}KB is within limit of ${MAX_SIZE_KB}KB"

      - uses: ./.github/actions/setup-build
        with:
          build-dir: build-test
          enable-curl: "true"

      - name: Run tests + count
        run: |
          OUTPUT=$(./build-test/human_tests 2>&1)
          echo "$OUTPUT" | tail -5
          RESULT=$(echo "$OUTPUT" | grep "^--- Results:" | head -1)
          echo "## Tests: $RESULT" >> $GITHUB_STEP_SUMMARY

      - name: Measure startup time
        run: |
          START=$(date +%s%N)
          ./build/human version 2>/dev/null || true
          END=$(date +%s%N)
          ELAPSED_MS=$(( (END - START) / 1000000 ))
          echo "## Startup: ${ELAPSED_MS}ms" >> $GITHUB_STEP_SUMMARY

      - name: Measure peak RSS
        run: |
          /usr/bin/time -v ./build-test/human_tests 2>&1 | grep "Maximum resident" | awk '{print $NF}' > /tmp/rss.txt || true
          RSS=$(cat /tmp/rss.txt 2>/dev/null || echo "N/A")
          echo "## Peak RSS: ${RSS} KB" >> $GITHUB_STEP_SUMMARY

      - name: Summary
        run: |
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Comparison Target" >> $GITHUB_STEP_SUMMARY
          echo "| Metric | Human | OpenClaw |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|----------|----------|" >> $GITHUB_STEP_SUMMARY
          echo "| Binary | ${BINARY_SIZE_KB} KB | ~75 MB (node_modules) |" >> $GITHUB_STEP_SUMMARY
          echo "| Dependencies | 0 (libc only) | 1,200+ npm packages |" >> $GITHUB_STEP_SUMMARY

      - name: Comment PR with benchmark
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const body = `## Performance Benchmark
            | Metric | Value |
            |--------|-------|
            | Binary Size | ${process.env.BINARY_SIZE_KB} KB |
            | Startup | Measured in CI |

            _Automated by benchmark workflow_`;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body
            });
