name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        build_type: [Debug, MinSizeRel]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6

      - name: Install deps (Ubuntu)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -q
          sudo apt-get install -yq libsqlite3-dev libcurl4-openssl-dev

      - name: Install deps (macOS)
        if: runner.os == 'macOS'
        run: brew install sqlite3 curl

      - name: Configure
        run: |
          cmake -B build \
            -DCMAKE_BUILD_TYPE=${{ matrix.build_type }} \
            -DSC_ENABLE_ALL_CHANNELS=ON \
            -DSC_ENABLE_CURL=ON

      - name: Build
        run: cmake --build build -j$(nproc 2>/dev/null || sysctl -n hw.ncpu)

      - name: Test
        run: ./build/seaclaw_tests

      - name: Persona CLI smoke test
        run: ./build/seaclaw persona list

  asan:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6

      - name: Install deps (Ubuntu)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -q
          sudo apt-get install -yq libsqlite3-dev libcurl4-openssl-dev

      - name: Install deps (macOS)
        if: runner.os == 'macOS'
        run: brew install sqlite3 curl

      - name: Configure with ASan
        run: |
          cmake -B build \
            -DCMAKE_BUILD_TYPE=Debug \
            -DCMAKE_C_FLAGS="-fsanitize=address -fno-omit-frame-pointer" \
            -DCMAKE_EXE_LINKER_FLAGS="-fsanitize=address" \
            -DSC_ENABLE_ALL_CHANNELS=ON \
            -DSC_ENABLE_CURL=ON

      - name: Build
        run: cmake --build build -j$(nproc 2>/dev/null || sysctl -n hw.ncpu)

      - name: Test (ASan)
        env:
          ASAN_OPTIONS: detect_leaks=1:halt_on_error=1
        run: ./build/seaclaw_tests

  binary-size:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install deps
        run: |
          sudo apt-get update -q
          sudo apt-get install -yq libsqlite3-dev libcurl4-openssl-dev

      - name: Build MinSizeRel + LTO (full)
        run: |
          cmake -B build \
            -DCMAKE_BUILD_TYPE=MinSizeRel \
            -DSC_ENABLE_LTO=ON \
            -DSC_ENABLE_ALL_CHANNELS=ON \
            -DSC_ENABLE_CURL=ON
          cmake --build build -j$(nproc)

      - name: Test release build
        run: ./build/seaclaw_tests

      - name: Check binary size
        run: |
          SIZE=$(stat -c%s build/seaclaw 2>/dev/null || stat -f%z build/seaclaw)
          echo "Binary size: ${SIZE} bytes ($(( SIZE / 1024 )) KB)"
          if [ "$SIZE" -gt 512000 ]; then
            echo "::error::Binary exceeds 512 KB hard limit"
            exit 1
          elif [ "$SIZE" -gt 480000 ]; then
            echo "::warning::Binary approaching 512 KB limit ($(( SIZE / 1024 )) KB)"
          fi

  cross-arm64:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install cross-compiler
        run: |
          sudo apt-get update -q
          sudo apt-get install -yq gcc-aarch64-linux-gnu libsqlite3-dev

      - name: Configure ARM64 cross-build
        run: |
          cmake -B build-arm64 \
            -DCMAKE_TOOLCHAIN_FILE=cmake/aarch64-linux-gnu.cmake \
            -DCMAKE_BUILD_TYPE=MinSizeRel

      - name: Build
        run: cmake --build build-arm64 -j$(nproc)

      - name: Verify binary
        run: file build-arm64/seaclaw | grep -i aarch64

  coverage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install deps
        run: |
          sudo apt-get update -q
          sudo apt-get install -yq libsqlite3-dev libcurl4-openssl-dev lcov bc

      - name: Configure with coverage
        run: |
          cmake -B build \
            -DCMAKE_BUILD_TYPE=Debug \
            -DCMAKE_C_FLAGS="--coverage -fprofile-arcs -ftest-coverage" \
            -DCMAKE_EXE_LINKER_FLAGS="--coverage" \
            -DSC_ENABLE_ALL_CHANNELS=ON \
            -DSC_ENABLE_CURL=ON

      - name: Build
        run: cmake --build build -j$(nproc)

      - name: Test
        run: ./build/seaclaw_tests

      - name: Generate coverage
        run: |
          lcov --capture --directory build --output-file coverage.info --ignore-errors mismatch
          lcov --remove coverage.info '*/tests/*' '/usr/*' --output-file coverage.info
          lcov --list coverage.info | tail -20

      - name: Upload coverage
        if: github.event_name == 'push'
        uses: codecov/codecov-action@v4
        with:
          file: coverage.info
          fail_ci_if_error: true

      - name: Check coverage threshold
        run: |
          TOTAL=$(lcov --summary coverage.info 2>&1 | grep "lines\.\.\." | sed 's/.*: //' | sed 's/%.*//')
          echo "Line coverage: ${TOTAL}%"
          THRESHOLD=70
          if [ "$(echo "$TOTAL < $THRESHOLD" | bc -l)" -eq 1 ]; then
            echo "::error::Coverage ${TOTAL}% is below ${THRESHOLD}% threshold"
            exit 1
          fi

  fuzz:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install deps
        run: |
          sudo apt-get update -q
          sudo apt-get install -yq libsqlite3-dev libcurl4-openssl-dev clang

      - name: Build fuzz targets
        run: |
          cmake -B build-fuzz \
            -DCMAKE_C_COMPILER=clang \
            -DCMAKE_CXX_COMPILER=clang++ \
            -DSC_ENABLE_FUZZ=ON \
            -DSC_ENABLE_ALL_CHANNELS=ON \
            -DSC_ENABLE_CURL=ON
          cmake --build build-fuzz -j$(nproc)

      - name: Smoke-test fuzzers (30s each)
        continue-on-error: true
        run: |
          for f in build-fuzz/fuzz_*; do
            echo "Running $(basename $f)..."
            timeout 30 $f -max_total_time=25
          done

  ui:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ui
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: ui/package-lock.json

      - run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint --if-present

      - name: Unit tests
        run: npm test --if-present

      - name: Build
        run: npm run build

      - name: Bundle size check
        run: |
          MAIN_SIZE=$(stat -c%s dist/assets/index-*.js 2>/dev/null || stat -f%z dist/assets/index-*.js)
          echo "Main bundle: ${MAIN_SIZE} bytes ($(( MAIN_SIZE / 1024 )) KB)"
          if [ "$MAIN_SIZE" -gt 200000 ]; then
            echo "::warning::UI main bundle exceeds 200 KB"
          fi

  token-drift:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: design-tokens/package-lock.json

      - name: Install token build deps
        working-directory: design-tokens
        run: npm ci --ignore-scripts 2>/dev/null || npm install tsx

      - name: Check token drift
        run: bash design-tokens/check-drift.sh

  e2e:
    runs-on: ubuntu-latest
    needs: [ui]
    defaults:
      run:
        working-directory: ui
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: ui/package-lock.json

      - run: npm ci
      - run: npx playwright install --with-deps chromium

      - name: Build
        run: npm run build

      - name: E2E tests
        run: npx playwright test

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: ui/playwright-report/
          retention-days: 14

      - name: Visual regression screenshots
        if: always()
        run: |
          npx vite preview --port 4173 &
          sleep 3
          npx playwright screenshot --browser chromium "http://localhost:4173/" "visual-overview.png"
          npx playwright screenshot --browser chromium "http://localhost:4173/#chat" "visual-chat.png"
        continue-on-error: true

      - name: Upload screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: visual-screenshots
          path: |
            ui/visual-overview.png
            ui/visual-chat.png
          retention-days: 14

  swift:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6

      - name: Build SeaClawKit
        working-directory: apps/shared/SeaClawKit
        run: swift build 2>&1 || echo "::warning::Swift build failed — check SeaClawKit sources"
        continue-on-error: true

      - name: Type check
        working-directory: apps/shared/SeaClawKit
        run: swift build -Xswiftc -typecheck 2>&1 || true
        continue-on-error: true

  android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build Android app
        working-directory: apps/android
        run: ./gradlew assembleDebug 2>&1 || echo "::warning::Android build failed — check app sources"
        continue-on-error: true

  flutter:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.27.x"
          channel: stable

      - name: Flutter analyze
        working-directory: apps/flutter
        run: flutter analyze 2>&1 || echo "::warning::Flutter analyze found issues"
        continue-on-error: true

      - name: Flutter test
        working-directory: apps/flutter
        run: flutter test 2>&1 || echo "::warning::Flutter tests failed"
        continue-on-error: true

  ios:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6

      - name: Build iOS app
        working-directory: apps/ios
        run: swift build 2>&1 || echo "::warning::iOS build failed"
        continue-on-error: true

  macos-app:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6

      - name: Build macOS app
        working-directory: apps/macos
        run: swift build 2>&1 || echo "::warning::macOS build failed"
        continue-on-error: true

  static-analysis:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y clang-tidy cmake libsqlite3-dev libcurl4-openssl-dev
      - name: Configure
        run: cmake -B build -DSC_ENABLE_ALL_CHANNELS=ON -DSC_ENABLE_CURL=ON -DCMAKE_EXPORT_COMPILE_COMMANDS=ON
      - name: Run clang-tidy
        run: |
          cd build
          FILES=$(find ../src -name '*.c' | head -50)
          clang-tidy $FILES -p . --warnings-as-errors='bugprone-*,cert-*,security-*' 2>&1 | tail -50 || true
