name: Run Human Tests
description: Execute the human_tests binary with optional ASan options

inputs:
  build-dir:
    description: Build directory containing human_tests
    default: build
  asan-options:
    description: ASAN_OPTIONS environment variable value
    default: ""

runs:
  using: composite
  steps:
    - name: Run tests
      shell: bash
      run: |
        if [ -n "${{ inputs.asan-options }}" ]; then
          ASAN_OPTIONS="${{ inputs.asan-options }}" ./${{ inputs.build-dir }}/human_tests 2>&1 | tee /tmp/human_tests_output.txt
        else
          ./${{ inputs.build-dir }}/human_tests 2>&1 | tee /tmp/human_tests_output.txt
        fi
