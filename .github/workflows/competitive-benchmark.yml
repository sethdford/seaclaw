name: Competitive Benchmark

on:
  schedule:
    - cron: "0 6 * * 0"
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "website/**"
      - "design-tokens/**"
      - ".lighthouserc.json"

permissions:
  contents: read

jobs:
  benchmark:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install jq and bc
        run: sudo apt-get install -y jq bc

      - name: Run competitive benchmark
        env:
          PAGESPEED_API_KEY: ${{ secrets.PAGESPEED_API_KEY }}
        run: bash scripts/benchmark-competitive.sh --markdown

      - name: Check h-uman performance thresholds
        run: bash scripts/check-competitive-thresholds.sh

      - name: Upload results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: competitive-benchmark
          path: |
            benchmark-competitive.json
            docs/competitive-benchmarks-latest.md
          retention-days: 90
