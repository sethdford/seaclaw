name: SeaClaw CI

on: [push, pull_request]

jobs:
  build-and-test:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-build
        with:
          enable-asan: "true"
          enable-curl: ${{ runner.os == 'Linux' && 'true' || 'false' }}
          enable-all-channels: "true"
      - uses: ./.github/actions/run-tests
        with:
          asan-options: ${{ runner.os == 'Linux' && 'detect_leaks=0:detect_stack_use_after_return=0' || '' }}

  release-size:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-build
        with:
          build-type: MinSizeRel
          enable-lto: "true"
          enable-all-channels: "true"
      - run: ls -lh build/seaclaw
      - run: |
          SIZE=$(stat -f%z build/seaclaw)
          if [ "$SIZE" -gt 512000 ]; then
            echo "Binary size $SIZE bytes exceeds 500KB (512000 bytes)"
            exit 1
          fi

  build-ios:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - run: cd apps/shared/SeaClawKit && swift test
      - run: cd apps/ios && swift build

  build-android:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: temurin
      - run: cd apps/android && chmod +x gradlew && ./gradlew assembleDebug

  ui:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ui
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: ui/package-lock.json
      - run: npm ci
      - run: npm run typecheck
      - run: npm run lint
      - run: npm run format:check
      - name: Test with coverage
        run: npm run test:coverage
      - run: npm run build

  ui-e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install
        run: cd ui && npm ci
      - name: Install Playwright browsers
        run: cd ui && npx playwright install --with-deps chromium
      - name: Build
        run: cd ui && npm run build
      - name: E2E tests
        run: cd ui && npx playwright test
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: ui/test-results/
          retention-days: 7

  completions:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Verify completions are parseable
        run: bash -n completions/seaclaw.bash
      - name: Verify completions cover all subcommands
        run: |
          CMDS=$(grep -oP '\{"[a-z-]+", "' src/main.c | sed 's/{"//;s/", "//' | sort)
          for cmd in $CMDS; do
            grep -q "$cmd" completions/seaclaw.bash || { echo "MISSING in bash: $cmd"; exit 1; }
            grep -q "$cmd" completions/_seaclaw || { echo "MISSING in zsh: $cmd"; exit 1; }
          done

  local-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y clang-format libcurl4-openssl-dev libsqlite3-dev
      - name: Run scripts/check.sh
        run: scripts/check.sh

  benchmark:
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-build
        with:
          build-type: MinSizeRel
          enable-lto: "true"
          enable-all-channels: "true"
      - name: Run benchmark
        run: scripts/benchmark.sh build/seaclaw --save-history
      - name: Upload benchmark results
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-results
          path: |
            benchmark-results.json
            benchmark-history.json
          retention-days: 90

  static-analysis:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-build
        with:
          enable-curl: "true"
          enable-all-channels: "true"
          extra-apt: clang-tidy
          extra-cmake-flags: -DCMAKE_EXPORT_COMPILE_COMMANDS=ON
      - name: Run clang-tidy on changed files
        run: |
          if [ -n "${GITHUB_BASE_REF:-}" ]; then
            FILES=$(git diff --name-only "origin/$GITHUB_BASE_REF" -- 'src/*.c' | head -20)
          else
            FILES=$(find src -name '*.c' -newer CMakeLists.txt | head -20)
          fi
          if [ -n "$FILES" ]; then
            echo "$FILES" | xargs clang-tidy -p build --warnings-as-errors='bugprone-use-after-move,security-*' 2>&1 | tail -30
          else
            echo "No changed C files to analyze"
          fi

  coverage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-build
        with:
          enable-curl: "true"
          enable-all-channels: "true"
          enable-coverage: "true"
          extra-apt: lcov
      - uses: ./.github/actions/run-tests
      - name: Generate coverage report
        run: |
          lcov --capture --directory build --output-file coverage.info --ignore-errors mismatch
          lcov --remove coverage.info '/usr/*' '*/tests/*' '*/vendor/*' --output-file coverage.info
          lcov --list coverage.info | tail -20
      - uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.info

  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: docker build --target release -t seaclaw:ci-test .
      - run: docker run --rm seaclaw:ci-test --version

  website:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: website/package-lock.json
      - run: cd website && npm ci && npm run build
      - run: test -d website/dist

  nix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: cachix/install-nix-action@v30
        with:
          nix_path: nixpkgs=channel:nixpkgs-unstable
      - run: nix build --no-link --print-build-logs
      - run: nix flake check

  docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check for stale branding
        run: |
          if grep -ri "nullclaw" docs/ skills/ sdk/ --include='*.md' -l 2>/dev/null | grep -v plans/; then
            echo "Found 'NullClaw' references — update to 'SeaClaw'"
            exit 1
          fi
      - name: Verify docs have frontmatter
        run: |
          MISSING=""
          for f in $(find docs -name '*.md' -not -path '*/plans/*'); do
            if ! head -1 "$f" | grep -q '^---'; then
              MISSING="$MISSING $f"
            fi
          done
          if [ -n "$MISSING" ]; then
            echo "Docs missing frontmatter:$MISSING"
          fi
