<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="h-uman Control — not quite human. AI assistant dashboard." />
    <meta name="theme-color" content="#0c0c0c" media="(prefers-color-scheme: dark)" />
    <meta name="theme-color" content="#fafafa" media="(prefers-color-scheme: light)" />
    <link rel="icon" type="image/svg+xml" href="/src/assets/logo.svg" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <title>h-uman Control</title>
  </head>
  <body>
    <a href="#main-content" class="skip-link">Skip to main content</a>
    <div
      id="main-content"
      tabindex="-1"
      style="position: absolute; left: -9999px; width: 1px; height: 1px"
      aria-hidden="true"
    ></div>
    <svg class="hu-glass-refraction-svg" aria-hidden="true" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <filter id="hu-refract" x="0" y="0" width="100%" height="100%">
          <feTurbulence
            type="fractalNoise"
            baseFrequency="0.015"
            numOctaves="3"
            seed="2"
            result="noise"
          />
          <feDisplacementMap
            in="SourceGraphic"
            in2="noise"
            scale="3"
            xChannelSelector="R"
            yChannelSelector="G"
          />
        </filter>
      </defs>
    </svg>
    <hu-app></hu-app>
    <script type="module" src="/src/main.ts"></script>
    <script>
      if ("serviceWorker" in navigator) {
        window.addEventListener("load", function() {
          navigator.serviceWorker.register("/sw.js").catch(function() {});
        });
      }
    </script>
  </body>
</html>
