name: Release

on:
  push:
    tags: ["v*"]

jobs:
  build:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        shell: bash
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: linux-x86_64
          - os: ubuntu-latest
            target: linux-aarch64
            cross: true
          - os: macos-latest
            target: macos-aarch64

    steps:
      - uses: actions/checkout@v6

      - name: Install aarch64 cross-compiler
        if: matrix.cross
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu g++-aarch64-linux-gnu \
            libsqlite3-dev:arm64 libcurl4-openssl-dev:arm64
        continue-on-error: true

      - uses: ./.github/actions/setup-build
        with:
          build-type: MinSizeRel
          enable-lto: "true"
          enable-curl: ${{ !matrix.cross && 'true' || 'false' }}
          enable-all-channels: "true"
          enable-update: "true"
          target: human
          extra-cmake-flags: ${{ matrix.cross && '-DCMAKE_C_COMPILER=aarch64-linux-gnu-gcc -DCMAKE_SYSTEM_NAME=Linux -DCMAKE_SYSTEM_PROCESSOR=aarch64' || '' }}

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: human-${{ matrix.target }}
          path: build/human

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v6
        with:
          sparse-checkout: |
            completions
            docs/man
            install.sh
            LICENSE

      - uses: actions/download-artifact@v8
        with:
          path: artifacts

      - name: Rename binaries
        run: |
          ls -R artifacts/
          mv artifacts/human-linux-x86_64/human human-linux-x86_64.bin
          mv artifacts/human-linux-aarch64/human human-linux-aarch64.bin
          mv artifacts/human-macos-aarch64/human human-macos-aarch64.bin
          chmod +x human-linux-x86_64.bin human-linux-aarch64.bin human-macos-aarch64.bin

      - name: Generate SHA256 checksums
        run: sha256sum human-linux-x86_64.bin human-linux-aarch64.bin human-macos-aarch64.bin > sha256sums.txt

      - name: Package completions and man pages
        run: tar czf human-extras.tar.gz completions/ docs/man/ install.sh LICENSE

      - name: Build .deb package (x86_64)
        run: |
          VER="${GITHUB_REF_NAME#v}"
          PKG=human_${VER}_amd64
          mkdir -p "${PKG}/DEBIAN"
          mkdir -p "${PKG}/usr/bin"
          mkdir -p "${PKG}/usr/share/man/man1"
          mkdir -p "${PKG}/usr/share/bash-completion/completions"
          mkdir -p "${PKG}/usr/share/zsh/vendor-completions"
          cp human-linux-x86_64.bin "${PKG}/usr/bin/human"
          chmod 755 "${PKG}/usr/bin/human"
          if [ -d docs/man ]; then
            cp docs/man/*.1 "${PKG}/usr/share/man/man1/" 2>/dev/null || true
          fi
          if [ -f completions/human.bash ]; then
            cp completions/human.bash "${PKG}/usr/share/bash-completion/completions/human"
          fi
          if [ -f completions/_human ]; then
            cp completions/_human "${PKG}/usr/share/zsh/vendor-completions/_human"
          fi
          cat > "${PKG}/DEBIAN/control" <<CTRL
          Package: human
          Version: ${VER}
          Section: utils
          Priority: optional
          Architecture: amd64
          Maintainer: Seth Ford <seth@h-uman.ai>
          Homepage: https://h-uman.ai
          Description: The smallest fully autonomous AI assistant infrastructure
           Zero-dependency C11 runtime for autonomous AI assistants.
           Sub-2 MB binary, <6 MB RAM, <30 ms startup.
          CTRL
          sed -i 's/^          //' "${PKG}/DEBIAN/control"
          dpkg-deb --build --root-owner-group "${PKG}"
          mv "${PKG}.deb" "human_${VER}_amd64.deb"

      - name: Create release
        uses: softprops/action-gh-release@v3
        with:
          files: |
            human-linux-x86_64.bin
            human-linux-aarch64.bin
            human-macos-aarch64.bin
            human_*_amd64.deb
            human-extras.tar.gz
            sha256sums.txt
            install.sh
          generate_release_notes: true

  docker:
    needs: release
    runs-on: ubuntu-latest
    continue-on-error: true
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v6

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to ghcr.io
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=semver,pattern={{raw}}
            type=raw,value=latest

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Scan image with Trivy
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ghcr.io/${{ github.repository }}:latest
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH

      - name: Upload Trivy scan results
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: trivy-results.sarif
