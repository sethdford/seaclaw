name: Security Scan

on:
  pull_request:
    branches: [main, master]
  schedule:
    - cron: "0 6 * * 1"
  workflow_dispatch:

jobs:
  ubsan:
    name: Build + Test (UBSan)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-build
        with:
          build-dir: build-ubsan
          enable-curl: "true"
          enable-all-channels: "true"
          extra-cmake-flags: >-
            -DCMAKE_C_FLAGS="-fsanitize=undefined -fno-sanitize-recover=all -g"
            -DCMAKE_EXE_LINKER_FLAGS="-fsanitize=undefined"
            -DHU_ENABLE_SQLITE=ON
      - name: Run tests with UBSan
        run: UBSAN_OPTIONS="print_stacktrace=1:halt_on_error=1" ./build-ubsan/human_tests

  build-and-test:
    name: Build + Test (ASan)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-build
        with:
          enable-asan: "true"
          enable-curl: "true"
          enable-all-channels: "true"
      - uses: ./.github/actions/run-tests
      - name: Check for ASan leaks
        run: |
          ASAN_OPTIONS=detect_leaks=1 ./build/human_tests 2>&1 | tee asan-output.txt
          if grep -q "ERROR: AddressSanitizer" asan-output.txt; then
            echo "ASan errors detected!"
            exit 1
          fi

  release-build:
    name: Release Build Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-build
        with:
          build-type: MinSizeRel
          enable-lto: "true"
          enable-curl: "true"
          enable-all-channels: "true"
      - name: Check binary size
        run: |
          SIZE=$(stat -c%s build/human 2>/dev/null || stat -f%z build/human)
          echo "Binary size: $SIZE bytes ($(echo "scale=1; $SIZE/1024" | bc)KB)"
          if [ "$SIZE" -gt 614400 ]; then
            echo "WARNING: Binary exceeds 600KB budget"
          fi

  fuzz-test:
    name: Fuzz Testing (30s each)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-build
        with:
          build-dir: build-fuzz
          enable-fuzz: "true"
          enable-curl: "true"
          extra-apt: clang
          extra-cmake-flags: -DCMAKE_C_COMPILER=clang -DCMAKE_CXX_COMPILER=clang++
      - name: Create seed corpora
        run: |
          mkdir -p corpus/json corpus/url corpus/http
          echo '{}' > corpus/json/1.json
          echo '{"k":"v","n":1,"a":[]}' > corpus/json/2.json
          echo 'https://example.com' > corpus/url/1.txt
          printf 'GET / HTTP/1.1\r\nHost: test\r\n\r\n' > corpus/http/1.txt
      - name: Fuzz JSON parser
        run: ./build-fuzz/fuzz_json_parser corpus/json -max_total_time=30 -print_final_stats=1
        continue-on-error: true
      - name: Fuzz URL validation
        run: ./build-fuzz/fuzz_url_validation corpus/url -max_total_time=30 -print_final_stats=1
        continue-on-error: true
      - name: Fuzz HTTP parser
        run: ./build-fuzz/fuzz_http_parse corpus/http -max_total_time=30 -print_final_stats=1
        continue-on-error: true

  sbom:
    name: Generate SBOM
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - run: chmod +x scripts/generate-sbom.sh && ./scripts/generate-sbom.sh . sbom.json
      - uses: actions/upload-artifact@v7
        with:
          name: sbom
          path: sbom.json

  audit-integrity:
    name: Verify Audit Log Integrity
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-build
      - uses: ./.github/actions/run-tests

  npm-audit:
    name: JS Dependency Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
      - name: Audit UI dependencies
        run: cd ui && npm ci && npm audit --audit-level=high
        continue-on-error: true
      - name: Audit website dependencies
        run: cd website && npm ci && npm audit --audit-level=high
        continue-on-error: true
      - name: Audit design-tokens dependencies
        run: cd design-tokens && npm ci && npm audit --audit-level=high
        continue-on-error: true

  fips-build:
    name: FIPS Crypto Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-build
        with:
          extra-apt: libssl-dev
          extra-cmake-flags: -DHU_ENABLE_FIPS_CRYPTO=ON
      - uses: ./.github/actions/run-tests
