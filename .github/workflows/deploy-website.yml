name: Deploy Website

on:
  push:
    branches: [main]
    paths:
      - "website/**"
      - "design-tokens/**"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: |
            design-tokens/package-lock.json
            website/package-lock.json

      - name: Install design-tokens deps
        run: cd design-tokens && npm ci --ignore-scripts

      - name: Build design tokens
        run: cd design-tokens && npm run build

      - name: Install website deps
        run: cd website && npm ci

      - name: Check formatting
        run: cd website && npm run format:check

      - name: Check website types
        run: cd website && npm run check

      - name: Build website
        run: cd website && npm run build

      - name: Lighthouse CI audit (desktop)
        uses: treosh/lighthouse-ci-action@v12
        with:
          uploadArtifacts: true
          artifactName: lighthouse-desktop
          temporaryPublicStorage: true
          configPath: website/.lighthouserc.json

      - name: Lighthouse CI audit (mobile)
        uses: treosh/lighthouse-ci-action@v12
        with:
          uploadArtifacts: true
          artifactName: lighthouse-mobile
          temporaryPublicStorage: true
          configPath: website/.lighthouserc-mobile.json

      - name: Configure Pages
        uses: actions/configure-pages@v6

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: website/dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
