name: SeaClaw CI

on: [push, pull_request]

jobs:
  build-and-test:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-build
        with:
          enable-asan: "true"
          enable-curl: ${{ runner.os == 'Linux' && 'true' || 'false' }}
          enable-all-channels: "true"
      - uses: ./.github/actions/run-tests
        with:
          asan-options: ${{ runner.os == 'Linux' && 'detect_leaks=0:detect_stack_use_after_return=0' || '' }}

  cross-arm64:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install ARM64 cross-compiler
        run: sudo apt-get update && sudo apt-get install -y gcc-aarch64-linux-gnu
      - name: Configure (ARM64 cross-compile)
        run: |
          cmake -B build-arm64 \
            -DCMAKE_TOOLCHAIN_FILE=cmake/aarch64-linux-gnu.cmake \
            -DCMAKE_BUILD_TYPE=MinSizeRel \
            -DSC_ENABLE_CURL=OFF \
            -DSC_ENABLE_TLS=OFF \
            -DSC_ENABLE_SQLITE=OFF
      - name: Build (ARM64)
        run: cmake --build build-arm64 -j$(nproc)
      - name: Verify binary
        run: file build-arm64/seaclaw | grep -i "aarch64\|ARM"

  minimal-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y cmake libsqlite3-dev libcurl4-openssl-dev
      - name: Configure
        run: cmake --preset minimal
      - name: Build
        run: cmake --build build-minimal -j$(nproc)
      - name: Run tests
        run: ./build-minimal/seaclaw_tests

  sandbox-integration:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake libsqlite3-dev libcurl4-openssl-dev firejail bubblewrap
      - name: Build
        run: |
          cmake -B build -DSC_ENABLE_ALL_CHANNELS=ON -DSC_ENABLE_CURL=ON
          cmake --build build -j$(nproc)
      - name: Test sandbox availability
        run: |
          echo '{"action":"list"}' | timeout 5 ./build/seaclaw tool shell --dry-run 2>&1 || true
          firejail --version
          bwrap --version
      - name: Run tests
        run: ./build/seaclaw_tests

  release-size:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-build
        with:
          build-type: MinSizeRel
          enable-lto: "true"
          enable-all-channels: "true"
      - run: ls -lh build/seaclaw
      - run: |
          SIZE=$(stat -f%z build/seaclaw)
          if [ "$SIZE" -gt 512000 ]; then
            echo "Binary size $SIZE bytes exceeds 500KB (512000 bytes)"
            exit 1
          fi

  build-ios:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - run: cd apps/shared/SeaClawKit && swift test
      - run: cd apps/ios && swift build

  build-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: temurin
      - run: cd apps/android && chmod +x gradlew && ./gradlew assembleDebug

  ui:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ui
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: ui/package-lock.json
      - run: npm ci
      - run: npm run typecheck
      - run: npm run lint
      - run: npm run format:check
      - name: Test with coverage
        run: npm run test:coverage
      - run: npm run build
      - name: Check bundle size
        run: bash scripts/check-bundle-size.sh
      - name: Component checklist
        run: bash scripts/check-component.sh
      - name: Bundle size check
        run: bash scripts/check-bundle-size.sh

  ui-e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Install
        run: cd ui && npm ci
      - name: Install Playwright browsers
        run: cd ui && npx playwright install --with-deps chromium
      - name: Build
        run: cd ui && npm run build
      - name: E2E tests
        run: cd ui && npx playwright test
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: ui/test-results/
          retention-days: 7

  build-deb:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake gcc libsqlite3-dev libcurl4-openssl-dev \
            debhelper devscripts fakeroot
      - name: Build .deb package
        run: bash scripts/build-deb.sh
      - name: Verify package
        run: |
          dpkg-deb --info ../*.deb
          dpkg-deb --contents ../*.deb | head -20
      - name: Copy .deb to workspace for artifact upload
        run: cp ../*.deb .
      - uses: actions/upload-artifact@v4
        with:
          name: debian-package
          path: "*.deb"

  completions:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Verify completions are parseable
        run: bash -n completions/seaclaw.bash
      - name: Verify completions cover all subcommands
        run: |
          CMDS=$(grep -oP '\{"[a-z-]+", "' src/main.c | sed 's/{"//;s/", "//' | sort)
          for cmd in $CMDS; do
            grep -q "$cmd" completions/seaclaw.bash || { echo "MISSING in bash: $cmd"; exit 1; }
            grep -q "$cmd" completions/_seaclaw || { echo "MISSING in zsh: $cmd"; exit 1; }
          done

  local-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y clang-format libcurl4-openssl-dev libsqlite3-dev
      - name: Run scripts/check.sh
        run: scripts/check.sh

  benchmark:
    if: github.event_name == 'push' || github.event_name == 'pull_request'
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-build
        with:
          build-type: MinSizeRel
          enable-lto: "true"
          enable-all-channels: "true"
          extra-cmake-flags: -DSC_ENABLE_BENCH=ON
      - name: Run benchmark
        run: scripts/benchmark.sh build/seaclaw --save-history
      - name: Run core benchmarks
        run: ./build/seaclaw_bench 2>&1 | tee benchmark-core.txt
      - name: Check for binary size regression
        run: |
          SIZE=$(stat -f%z build/seaclaw 2>/dev/null || stat -c%s build/seaclaw)
          echo "Release binary: $SIZE bytes"
          # Hard limit: 512KB (524288 bytes)
          if [ "$SIZE" -gt 524288 ]; then
            echo "::error::Binary size $SIZE exceeds 512KB limit"
            exit 1
          fi
          # Warn at 480KB
          if [ "$SIZE" -gt 491520 ]; then
            echo "::warning::Binary size $SIZE approaching 512KB limit"
          fi
      - name: Check test count
        run: |
          COUNT=$(./build/seaclaw_tests 2>&1 | grep -oE '[0-9]+/[0-9]+ passed' | head -1 | cut -d/ -f1)
          echo "Tests: $COUNT"
          if [ "$COUNT" -lt 2400 ]; then
            echo "::error::Test count $COUNT dropped below 2400 minimum"
            exit 1
          fi
      - name: Upload benchmark results
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-results
          path: |
            benchmark-results.json
            benchmark-history.json
            benchmark-core.txt
          retention-days: 90

  static-analysis:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-build
        with:
          enable-curl: "true"
          enable-all-channels: "true"
          extra-apt: clang-tidy
          extra-cmake-flags: -DCMAKE_EXPORT_COMPILE_COMMANDS=ON
      - name: Run clang-tidy on changed files
        run: |
          if [ -n "${GITHUB_BASE_REF:-}" ]; then
            FILES=$(git diff --name-only "origin/$GITHUB_BASE_REF" -- 'src/*.c' | head -20)
          else
            FILES=$(find src -name '*.c' -newer CMakeLists.txt | head -20)
          fi
          if [ -n "$FILES" ]; then
            echo "$FILES" | xargs clang-tidy -p build --warnings-as-errors='bugprone-use-after-move,security-*' 2>&1 | tail -30
          else
            echo "No changed C files to analyze"
          fi

  security-scan:
    runs-on: ubuntu-latest
    permissions:
      security-events: write
    steps:
      - uses: actions/checkout@v4
      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: cpp
      - name: Build for analysis
        run: |
          sudo apt-get update && sudo apt-get install -y cmake libsqlite3-dev libcurl4-openssl-dev
          cmake -B build -DSC_ENABLE_ALL_CHANNELS=ON -DSC_ENABLE_CURL=ON
          cmake --build build -j$(nproc)
      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@v3

  coverage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-build
        with:
          enable-curl: "true"
          enable-all-channels: "true"
          enable-coverage: "true"
          extra-apt: lcov
      - uses: ./.github/actions/run-tests
      - name: Generate coverage report
        run: |
          lcov --capture --directory build --output-file coverage.info --ignore-errors mismatch
          lcov --remove coverage.info '/usr/*' '*/tests/*' '*/vendor/*' --output-file coverage.info
          lcov --list coverage.info | tail -20
      - uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.info
      - name: Upload to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: coverage.info
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  fuzz:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake clang libsqlite3-dev libcurl4-openssl-dev
      - name: Configure
        run: |
          cmake -B build-fuzz \
            -DSC_ENABLE_FUZZING=ON \
            -DCMAKE_C_COMPILER=clang \
            -DSC_ENABLE_CURL=ON \
            -DSC_ENABLE_SQLITE=ON
      - name: Build
        run: cmake --build build-fuzz -j$(nproc)
      - name: Create corpus and seed
        run: |
          mkdir -p corpus/json corpus/http corpus/url
          echo '{}' > corpus/json/empty.json
          echo '{"a":1}' > corpus/json/obj.json
          echo '"hello"' > corpus/json/str.json
      - name: Run fuzz harnesses
        run: |
          for h in build-fuzz/fuzz_json_parser build-fuzz/fuzz_http_parse build-fuzz/fuzz_url_validation; do
            if [ -f "$h" ]; then
              echo "==> Fuzzing $(basename $h)"
              case "$(basename $h)" in
                fuzz_json_parser) corpus=corpus/json ;;
                fuzz_http_parse) corpus=corpus/http ;;
                fuzz_url_validation) corpus=corpus/url ;;
                *) corpus=corpus ;;
              esac
              timeout 35 "$h" -max_total_time=30 "$corpus" || true
            fi
          done
      - uses: actions/upload-artifact@v4
        with:
          name: fuzz-corpus
          path: corpus/
          retention-days: 30

  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: docker build --target release -t seaclaw:ci-test .
      - run: docker run --rm seaclaw:ci-test --version

  website:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: website/package-lock.json
      - run: cd website && npm ci
      - run: cd website && npm run check
      - run: cd website && npm run build
      - run: test -d website/dist

  lighthouse:
    runs-on: ubuntu-latest
    needs: website
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: website/package-lock.json
      - run: cd website && npm ci && npm run build
      - name: Lighthouse CI
        uses: treosh/lighthouse-ci-action@v12
        with:
          uploadArtifacts: true
          temporaryPublicStorage: true
          configPath: .lighthouserc.json

  design-tokens:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: design-tokens/package-lock.json
      - run: cd design-tokens && npm ci && npm run build -- --outdir /tmp/dt-check
      - run: bash design-tokens/check-drift.sh

  nix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: cachix/install-nix-action@v30
        with:
          nix_path: nixpkgs=channel:nixpkgs-unstable
      - run: nix build --no-link --print-build-logs
      - run: nix flake check

  ollama-integration:
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - name: Install Ollama
        run: curl -fsSL https://ollama.com/install.sh | sh
      - name: Pull tinyllama
        run: ollama pull tinyllama
      - name: Build
        run: |
          cmake -B build -DSC_ENABLE_ALL_CHANNELS=ON -DSC_ENABLE_CURL=ON
          cmake --build build -j$(nproc)
      - name: Run integration tests
        run: ./build/seaclaw_tests

  docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check for stale branding
        run: |
          if grep -ri "nullclaw" docs/ skills/ sdk/ --include='*.md' -l 2>/dev/null | grep -v plans/; then
            echo "Found 'NullClaw' references — update to 'SeaClaw'"
            exit 1
          fi
      - name: Verify docs have frontmatter
        run: |
          MISSING=""
          for f in $(find docs -name '*.md' -not -path '*/plans/*'); do
            if ! head -1 "$f" | grep -q '^---'; then
              MISSING="$MISSING $f"
            fi
          done
          if [ -n "$MISSING" ]; then
            echo "Docs missing frontmatter:$MISSING"
            exit 1
          fi
