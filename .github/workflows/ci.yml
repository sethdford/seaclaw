name: SeaClaw CI

on: [push, pull_request]

jobs:
  build-and-test:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - name: Cache CMake build
        uses: actions/cache@v5
        with:
          path: build
          key: ${{ runner.os }}-cmake-${{ hashFiles('CMakeLists.txt', 'src/**', 'include/**') }}
          restore-keys: |
            ${{ runner.os }}-cmake-
      - uses: ./.github/actions/setup-build
        with:
          enable-asan: "true"
          enable-curl: ${{ runner.os == 'Linux' && 'true' || 'false' }}
          enable-all-channels: "true"
      - uses: ./.github/actions/run-tests
        with:
          asan-options: ${{ runner.os == 'Linux' && 'detect_leaks=0:detect_stack_use_after_return=0' || '' }}
      - name: Persona CLI smoke test
        run: |
          ./build/seaclaw persona list
          mkdir -p "$HOME/.seaclaw/personas"
          echo '{"version":1,"name":"ci_test","core":{"identity":"CI test persona","traits":["direct"]}}' > "$HOME/.seaclaw/personas/ci_test.json"
          ./build/seaclaw persona validate ci_test
          ./build/seaclaw persona show ci_test
      - name: Test count regression guard
        run: |
          COUNT=$(./build/seaclaw_tests 2>&1 | grep -oE '[0-9]+/[0-9]+ passed' | head -1 | cut -d/ -f1)
          echo "Test count: $COUNT"
          if [ "$COUNT" -lt 3183 ]; then
            echo "Test count regression: $COUNT < 3183 baseline"
            exit 1
          fi
      - name: Check for untested modules
        run: scripts/check-untested.sh

  cross-arm64:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install ARM64 cross-compiler
        run: sudo apt-get update && sudo apt-get install -y gcc-aarch64-linux-gnu
      - name: Configure (ARM64 cross-compile)
        run: |
          cmake -B build-arm64 \
            -DCMAKE_TOOLCHAIN_FILE=cmake/aarch64-linux-gnu.cmake \
            -DCMAKE_BUILD_TYPE=MinSizeRel \
            -DSC_ENABLE_CURL=OFF \
            -DSC_ENABLE_TLS=OFF \
            -DSC_ENABLE_SQLITE=OFF
      - name: Build (ARM64)
        run: cmake --build build-arm64 -j$(nproc)
      - name: Verify binary
        run: file build-arm64/seaclaw | grep -i "aarch64\|ARM"

  minimal-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y cmake libsqlite3-dev libcurl4-openssl-dev
      - name: Configure
        run: cmake --preset minimal
      - name: Build
        run: cmake --build build-minimal -j$(nproc)
      - name: Run tests
        run: ./build-minimal/seaclaw_tests

  release-size:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-build
        with:
          build-type: MinSizeRel
          enable-lto: "true"
          enable-all-channels: "true"
      - run: ls -lh build/seaclaw
      - name: Enforce binary size budget (600KB)
        run: |
          SIZE=$(stat -f%z build/seaclaw)
          BUDGET=614400
          KB=$((SIZE / 1024))
          PCT=$((SIZE * 100 / BUDGET))
          echo "::notice::Binary size: ${KB}KB (${PCT}% of 600KB budget)"
          if [ "$SIZE" -gt "$BUDGET" ]; then
            echo "::error::Binary size ${KB}KB exceeds 600KB budget"
            exit 1
          fi

  build-ios:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6
      - run: cd apps/shared/SeaClawKit && swift test
      - run: cd apps/ios && swift build
      - name: iOS simulator test
        run: |
          cd apps/ios
          xcodebuild test \
            -scheme SeaClaw \
            -destination 'platform=iOS Simulator,name=iPhone 16,OS=latest' \
            -resultBundlePath TestResults \
            CODE_SIGNING_ALLOWED=NO 2>&1 || echo "Simulator tests skipped (no Xcode project)"

  build-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with:
          java-version: "17"
          distribution: temurin
      - run: cd apps/android && chmod +x gradlew && ./gradlew assembleDebug
      - name: Android lint + unit tests
        run: cd apps/android && ./gradlew lint test 2>&1 || echo "Lint/test completed with warnings"

  ui:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ui
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: ui/package-lock.json
      - run: npm ci
      - run: npm run typecheck
      - run: npm run lint
      - name: Strict lint
        run: npm run lint:strict
      - run: npm run format:check
      - name: Test with coverage
        run: npm run test:coverage
      - run: npm run build
      - name: Enforce bundle size budget (350KB)
        run: bash scripts/check-bundle-size.sh

  ui-e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "20"
      - name: Install system deps
        run: sudo apt-get update && sudo apt-get install -y libsqlite3-dev
      - name: Build gateway
        run: |
          cmake -B build -DCMAKE_BUILD_TYPE=Debug -DSC_BUILD_TESTS=OFF
          cmake --build build -j$(nproc)
      - name: Start gateway
        run: |
          nohup ./build/seaclaw gateway --port 3000 &>/dev/null &
          sleep 2
      - name: Install
        run: cd ui && npm ci
      - name: Install Playwright browsers
        run: cd ui && npx playwright install --with-deps chromium
      - name: Build
        run: cd ui && npm run build
      - name: E2E tests
        run: cd ui && npx playwright test
      - uses: actions/upload-artifact@v7
        if: failure()
        with:
          name: playwright-report
          path: ui/test-results/
          retention-days: 7

  visual-regression:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: ui/package-lock.json
      - run: cd ui && npm ci
      - run: cd ui && npm run build
      - name: Install Playwright browsers
        run: cd ui && npx playwright install --with-deps chromium
      - name: Visual regression tests
        run: cd ui && npx playwright test visual
      - uses: actions/upload-artifact@v7
        if: failure()
        with:
          name: visual-regression
          path: |
            ui/test-results/
            ui/playwright-report/
          retention-days: 14

  build-deb:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake gcc libsqlite3-dev libcurl4-openssl-dev \
            debhelper devscripts fakeroot
      - name: Build .deb package
        run: bash scripts/build-deb.sh
      - name: Verify package
        run: |
          dpkg-deb --info ../*.deb
          dpkg-deb --contents ../*.deb | head -20
      - name: Copy .deb to workspace for artifact upload
        run: cp ../*.deb .
      - uses: actions/upload-artifact@v7
        with:
          name: debian-package
          path: "*.deb"

  completions:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Verify completions are parseable
        run: bash -n completions/seaclaw.bash
      - name: Verify completions cover all subcommands
        run: |
          CMDS=$(grep -oP '\{"[a-z-]+", "' src/main.c | sed 's/{"//;s/", "//' | sort)
          for cmd in $CMDS; do
            grep -q "$cmd" completions/seaclaw.bash || { echo "MISSING in bash: $cmd"; exit 1; }
            grep -q "$cmd" completions/_seaclaw || { echo "MISSING in zsh: $cmd"; exit 1; }
          done

  local-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libcurl4-openssl-dev libsqlite3-dev
          sudo apt-get install -y clang-format-18 || sudo apt-get install -y clang-format
          if command -v clang-format-18 >/dev/null; then
            sudo ln -sf $(which clang-format-18) /usr/local/bin/clang-format
          fi
      - name: Run scripts/check.sh
        run: SC_SKIP_FORMAT=1 scripts/check.sh

  benchmark:
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-build
        with:
          build-type: MinSizeRel
          enable-lto: "true"
          enable-all-channels: "true"
          extra-cmake-flags: -DSC_ENABLE_BENCH=ON
      - name: Run benchmark
        run: scripts/benchmark.sh build/seaclaw --save-history
      - name: Run core benchmarks
        run: ./build/seaclaw_bench 2>&1 | tee benchmark-core.txt
      - name: Upload benchmark results
        uses: actions/upload-artifact@v7
        with:
          name: benchmark-results
          path: |
            benchmark-results.json
            benchmark-history.json
            benchmark-core.txt
          retention-days: 90

  static-analysis:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-build
        with:
          enable-curl: "true"
          enable-all-channels: "true"
          extra-apt: clang-tidy
          extra-cmake-flags: -DCMAKE_EXPORT_COMPILE_COMMANDS=ON
      - name: Run clang-tidy on changed files
        run: |
          if [ -n "${GITHUB_BASE_REF:-}" ]; then
            FILES=$(git diff --name-only "origin/$GITHUB_BASE_REF" -- 'src/**/*.c' | head -20)
          else
            FILES=$(find src -name '*.c' -newer CMakeLists.txt | head -20)
          fi
          if [ -n "$FILES" ]; then
            echo "$FILES" | xargs clang-tidy -p build --warnings-as-errors='bugprone-use-after-move,security-*' 2>&1 | tail -30
          else
            echo "No changed C files to analyze"
          fi

  coverage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-build
        with:
          enable-curl: "true"
          enable-all-channels: "true"
          enable-coverage: "true"
          extra-apt: lcov
      - uses: ./.github/actions/run-tests
      - name: Generate coverage report
        run: |
          lcov --capture --directory build --output-file coverage.info --ignore-errors mismatch,gcov
          lcov --remove coverage.info '/usr/*' '*/tests/*' '*/vendor/*' --output-file coverage.info --ignore-errors unused
          lcov --list coverage.info | tail -20
      - name: Upload to Codecov
        uses: codecov/codecov-action@v5
        with:
          files: coverage.info
          fail_ci_if_error: false
      - uses: actions/upload-artifact@v7
        with:
          name: coverage-report
          path: coverage.info
        continue-on-error: true

  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - run: docker build --target release -t seaclaw:ci-test .
      - run: docker run --rm seaclaw:ci-test --version

  website:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: website/package-lock.json
      - run: cd website && npm ci
      - run: cd website && npm run format:check
      - run: cd website && npm run check
      - run: cd website && npm run build
      - run: test -d website/dist

  lighthouse:
    runs-on: ubuntu-latest
    needs: website
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: website/package-lock.json
      - run: cd website && npm ci && npm run build
      - name: Lighthouse CI
        uses: treosh/lighthouse-ci-action@v12
        with:
          uploadArtifacts: true
          temporaryPublicStorage: true
          configPath: .lighthouserc.json

  design-tokens:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: design-tokens/package-lock.json
      - run: cd design-tokens && npm ci && npm run build -- --outdir /tmp/dt-check
      - run: bash design-tokens/check-drift.sh

  nix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: cachix/install-nix-action@v31
        with:
          nix_path: nixpkgs=channel:nixpkgs-unstable
      - run: nix build --no-link --print-build-logs
      - run: nix flake check

  ollama-integration:
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v6
      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y libsqlite3-dev libcurl4-openssl-dev
      - name: Install Ollama
        run: curl -fsSL https://ollama.com/install.sh | sh
      - name: Start Ollama server
        run: nohup ollama serve &>/dev/null &
      - name: Wait for Ollama
        run: |
          for i in $(seq 1 30); do
            curl -sf http://localhost:11434/api/version && break || sleep 1
          done
      - name: Pull tinyllama
        run: ollama pull tinyllama
      - name: Build
        run: |
          cmake -B build -DSC_ENABLE_ALL_CHANNELS=ON -DSC_ENABLE_CURL=ON
          cmake --build build -j$(nproc)
      - name: Run integration tests
        run: ./build/seaclaw_tests

  docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Check for stale branding
        run: |
          if grep -ri "nullclaw" docs/ skills/ sdk/ --include='*.md' -l 2>/dev/null | grep -v plans/; then
            echo "Found 'NullClaw' references — update to 'SeaClaw'"
            exit 1
          fi
      - name: Verify docs have frontmatter
        run: |
          MISSING=""
          for f in $(find docs -name '*.md' -not -path '*/plans/*'); do
            if ! head -1 "$f" | grep -q '^---'; then
              MISSING="$MISSING $f"
            fi
          done
          if [ -n "$MISSING" ]; then
            echo "Docs missing frontmatter:$MISSING"
            exit 1
          fi

  fuzz:
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install Clang and build deps
        run: sudo apt-get update && sudo apt-get install -y clang libsqlite3-dev
      - name: Configure (fuzz)
        env:
          CC: clang
          CXX: clang++
        run: |
          cmake -B build-fuzz \
            -DCMAKE_C_COMPILER=clang \
            -DCMAKE_CXX_COMPILER=clang++ \
            -DSC_ENABLE_FUZZ=ON \
            -DSC_ENABLE_ALL_CHANNELS=ON
      - name: Build (fuzz)
        run: cmake --build build-fuzz -j$(nproc)
      - name: Run fuzz harnesses
        continue-on-error: true
        run: |
          mkdir -p fuzz/corpus/url
          ./build-fuzz/fuzz_json_parse fuzz/corpus/json -max_total_time=30 -print_final_stats=1 || true
          ./build-fuzz/fuzz_config_load fuzz/corpus/config -max_total_time=30 -print_final_stats=1 || true
          ./build-fuzz/fuzz_tool_params -max_total_time=30 -print_final_stats=1 || true
          ./build-fuzz/fuzz_base64 -max_total_time=30 -print_final_stats=1 || true
          ./build-fuzz/fuzz_json fuzz/corpus/json -max_total_time=30 -print_final_stats=1 || true
          ./build-fuzz/fuzz_config fuzz/corpus/config -max_total_time=30 -print_final_stats=1 || true
          ./build-fuzz/fuzz_url_encode fuzz/corpus/url -max_total_time=30 -print_final_stats=1 || true
          ./build-fuzz/fuzz_persona_json -max_total_time=30 -print_final_stats=1 || true
          ./build-fuzz/fuzz_sse -max_total_time=30 -print_final_stats=1 || true
          ./build-fuzz/fuzz_http_parse -max_total_time=30 -print_final_stats=1 || true
