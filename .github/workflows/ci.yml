name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        build_type: [Debug, MinSizeRel]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6

      - name: Install deps (Ubuntu)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -q
          sudo apt-get install -yq libsqlite3-dev libcurl4-openssl-dev

      - name: Install deps (macOS)
        if: runner.os == 'macOS'
        run: brew install sqlite3 curl

      - name: Configure
        run: |
          cmake -B build \
            -DCMAKE_BUILD_TYPE=${{ matrix.build_type }} \
            -DSC_ENABLE_ALL_CHANNELS=ON \
            -DSC_ENABLE_CURL=ON

      - name: Build
        run: cmake --build build -j$(nproc 2>/dev/null || sysctl -n hw.ncpu)

      - name: Test
        run: ./build/seaclaw_tests

  asan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install deps
        run: |
          sudo apt-get update -q
          sudo apt-get install -yq libsqlite3-dev libcurl4-openssl-dev

      - name: Configure with ASan
        run: |
          cmake -B build \
            -DCMAKE_BUILD_TYPE=Debug \
            -DCMAKE_C_FLAGS="-fsanitize=address -fno-omit-frame-pointer" \
            -DCMAKE_EXE_LINKER_FLAGS="-fsanitize=address" \
            -DSC_ENABLE_ALL_CHANNELS=ON \
            -DSC_ENABLE_CURL=ON

      - name: Build
        run: cmake --build build -j$(nproc)

      - name: Test (ASan)
        env:
          ASAN_OPTIONS: detect_leaks=1:halt_on_error=1
        run: ./build/seaclaw_tests

  binary-size:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install deps
        run: |
          sudo apt-get update -q
          sudo apt-get install -yq libsqlite3-dev libcurl4-openssl-dev

      - name: Build MinSizeRel + LTO
        run: |
          cmake -B build \
            -DCMAKE_BUILD_TYPE=MinSizeRel \
            -DSC_ENABLE_LTO=ON
          cmake --build build -j$(nproc)

      - name: Check binary size
        run: |
          SIZE=$(stat -c%s build/seaclaw 2>/dev/null || stat -f%z build/seaclaw)
          echo "Binary size: ${SIZE} bytes ($(( SIZE / 1024 )) KB)"
          if [ "$SIZE" -gt 400000 ]; then
            echo "::warning::Binary exceeds 400 KB target"
          fi
