name: Human CI

on:
  push:
  pull_request:
  schedule:
    - cron: "0 9 * * 1"
  workflow_dispatch:

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      c: ${{ steps.filter.outputs.c }}
      ui: ${{ steps.filter.outputs.ui }}
      website: ${{ steps.filter.outputs.website }}
      ios: ${{ steps.filter.outputs.ios }}
      android: ${{ steps.filter.outputs.android }}
      macos_app: ${{ steps.filter.outputs.macos_app }}
      docker: ${{ steps.filter.outputs.docker }}
      nix: ${{ steps.filter.outputs.nix }}
      docs: ${{ steps.filter.outputs.docs }}
      ci: ${{ steps.filter.outputs.ci }}
    steps:
      - uses: actions/checkout@v6
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            c:
              - 'src/**'
              - 'include/**'
              - 'CMakeLists.txt'
              - 'cmake/**'
              - 'tests/**'
              - 'fuzz/**'
            ui:
              - 'ui/**'
            website:
              - 'website/**'
              - 'design-tokens/**'
            ios:
              - 'apps/ios/**'
              - 'apps/shared/**'
            android:
              - 'apps/android/**'
              - 'apps/shared/**'
            macos_app:
              - 'apps/macos/**'
              - 'apps/shared/**'
            docker:
              - 'Dockerfile'
              - '.dockerignore'
            nix:
              - 'flake.nix'
              - 'flake.lock'
              - '*.nix'
            docs:
              - 'docs/**'
              - '*.md'
            ci:
              - '.github/**'

  build-and-test:
    needs: changes
    if: >-
      needs.changes.outputs.c == 'true' ||
      needs.changes.outputs.ci == 'true' ||
      github.event_name == 'schedule' ||
      github.event_name == 'workflow_dispatch'
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        shard: [1, 2, 3, 4]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - name: Cache CMake build
        uses: actions/cache@v5
        with:
          path: build
          key: ${{ runner.os }}-${{ github.repository }}-cmake-${{ hashFiles('CMakeLists.txt', 'src/**', 'include/**') }}
          restore-keys: |
            ${{ runner.os }}-${{ github.repository }}-cmake-
      - uses: ./.github/actions/setup-build
        with:
          enable-asan: "true"
          enable-curl: "true"
          enable-all-channels: "true"
      - uses: ./.github/actions/run-tests
        with:
          asan-options: ${{ runner.os == 'Linux' && 'detect_leaks=0:detect_stack_use_after_return=0' || '' }}
          shard: ${{ matrix.shard }}/4
      - name: Validate eval suites
        if: matrix.shard == 1
        run: ./build/human eval validate eval_suites/
      - name: Check eval regression
        if: matrix.shard == 1
        run: |
          mkdir -p "$HOME/.human"
          echo '{"default_provider":"openai","default_model":"gpt-4o-mini","memory":{"backend":"sqlite"}}' > "$HOME/.human/config.json"
          ./build/human eval check-regression eval_suites/
      - name: Persona CLI smoke test
        if: matrix.shard == 1
        run: |
          ./build/human persona list
          mkdir -p "$HOME/.human/personas"
          echo '{"version":1,"name":"ci_test","core":{"identity":"CI test persona","traits":["direct"]}}' > "$HOME/.human/personas/ci_test.json"
          ./build/human persona validate ci_test
          ./build/human persona show ci_test
      - name: Test count regression guard
        run: |
          COUNT=$(grep -oE '[0-9]+/[0-9]+ passed' /tmp/human_tests_output.txt | tail -1 | cut -d/ -f1)
          echo "Test count (shard ${{ matrix.shard }}/4): $COUNT"
          BASELINE=$((8500 / 4))
          if [ "$COUNT" -lt "$BASELINE" ]; then
            echo "::error::Test count regression in shard ${{ matrix.shard }}: $COUNT < $BASELINE baseline (8500/4)"
            exit 1
          fi
      - name: Check for untested modules
        if: matrix.shard == 1
        run: scripts/check-untested.sh

  integration-tests:
    needs: changes
    if: >-
      needs.changes.outputs.c == 'true' ||
      needs.changes.outputs.ci == 'true' ||
      github.event_name == 'schedule' ||
      github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y cmake libsqlite3-dev libcurl4-openssl-dev
      - name: Configure
        run: |
          cmake -B build-integ \
            -DCMAKE_BUILD_TYPE=Debug \
            -DHU_ENABLE_INTEGRATION_TESTS=ON \
            -DHU_ENABLE_CURL=ON \
            -DHU_ENABLE_SQLITE=ON \
            -DHU_ENABLE_CLI=ON \
            -DHU_ENABLE_IMAP=ON
      - name: Build
        run: cmake --build build-integ -j$(nproc)
      - name: Run integration tests
        run: ./build-integ/human_integration_tests

  cross-arm64:
    needs: changes
    if: >-
      needs.changes.outputs.c == 'true' ||
      needs.changes.outputs.ci == 'true' ||
      github.event_name == 'schedule' ||
      github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install ARM64 cross-compiler
        run: sudo apt-get update && sudo apt-get install -y gcc-aarch64-linux-gnu
      - name: Configure (ARM64 cross-compile)
        run: |
          cmake -B build-arm64 \
            -DCMAKE_TOOLCHAIN_FILE=cmake/aarch64-linux-gnu.cmake \
            -DCMAKE_BUILD_TYPE=MinSizeRel \
            -DHU_ENABLE_CURL=OFF \
            -DHU_ENABLE_TLS=OFF \
            -DHU_ENABLE_SQLITE=OFF
      - name: Build (ARM64)
        run: cmake --build build-arm64 -j$(nproc)
      - name: Verify binary
        run: file build-arm64/human | grep -i "aarch64\|ARM"

  minimal-build:
    needs: changes
    if: >-
      needs.changes.outputs.c == 'true' ||
      needs.changes.outputs.ci == 'true' ||
      github.event_name == 'schedule' ||
      github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y cmake libsqlite3-dev libcurl4-openssl-dev
      - name: Configure
        run: cmake --preset minimal
      - name: Build
        run: cmake --build build-minimal -j$(nproc)
      - name: Run tests
        run: ./build-minimal/human_tests

  feature-flags:
    needs: changes
    if: >-
      needs.changes.outputs.c == 'true' ||
      needs.changes.outputs.ci == 'true' ||
      github.event_name == 'schedule' ||
      github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: no-sqlite
            flags: "-DHU_ENABLE_SQLITE=OFF -DHU_ENABLE_ALL_CHANNELS=ON"
          - name: no-persona
            flags: "-DHU_ENABLE_SQLITE=ON -DHU_ENABLE_ALL_CHANNELS=ON -DHU_ENABLE_PERSONA=OFF"
          - name: no-skills
            flags: "-DHU_ENABLE_SQLITE=ON -DHU_ENABLE_ALL_CHANNELS=ON -DHU_ENABLE_SKILLS=OFF"
          - name: kitchen-sink
            flags: "-DHU_ENABLE_SQLITE=ON -DHU_ENABLE_ALL_CHANNELS=ON -DHU_ENABLE_PERSONA=ON -DHU_ENABLE_SKILLS=ON"
          - name: feeds-enabled
            flags: "-DHU_ENABLE_SQLITE=ON -DHU_ENABLE_ALL_CHANNELS=ON -DHU_ENABLE_FEEDS=ON -DHU_ENABLE_CURL=ON"
    steps:
      - uses: actions/checkout@v6
      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y cmake libsqlite3-dev libcurl4-openssl-dev
      - name: Configure (${{ matrix.name }})
        run: cmake -B build ${{ matrix.flags }}
      - name: Build
        run: cmake --build build -j$(nproc)
      - name: Test (${{ matrix.name }})
        run: ./build/human_tests
        continue-on-error: false

  preset-check:
    needs: changes
    if: >-
      needs.changes.outputs.c == 'true' ||
      needs.changes.outputs.ci == 'true' ||
      github.event_name == 'schedule' ||
      github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        preset: [dev, test, release]
    steps:
      - uses: actions/checkout@v6
      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y cmake libsqlite3-dev libcurl4-openssl-dev
      - name: Configure (${{ matrix.preset }})
        run: cmake --preset ${{ matrix.preset }}
      - name: Build (${{ matrix.preset }})
        run: cmake --build --preset ${{ matrix.preset }}

  release-size:
    needs: changes
    if: >-
      needs.changes.outputs.c == 'true' ||
      needs.changes.outputs.ci == 'true' ||
      github.event_name == 'schedule' ||
      github.event_name == 'workflow_dispatch'
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-build
        with:
          build-type: MinSizeRel
          enable-lto: "true"
          enable-all-channels: "true"
      - run: ls -lh build/human
      - name: Enforce binary size budget (1800KB)
        run: |
          SIZE=$(stat -f%z build/human)
          BUDGET=1843200
          KB=$((SIZE / 1024))
          PCT=$((SIZE * 100 / BUDGET))
          echo "::notice::Binary size: ${KB}KB (${PCT}% of 1800KB budget)"
          if [ "$SIZE" -gt "$BUDGET" ]; then
            echo "::error::Binary size ${KB}KB exceeds 1800KB budget"
            exit 1
          fi

  build-ios:
    needs: changes
    if: >-
      needs.changes.outputs.ios == 'true' ||
      needs.changes.outputs.ci == 'true' ||
      github.event_name == 'schedule' ||
      github.event_name == 'workflow_dispatch'
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6
      - run: cd apps/shared/HumanKit && swift test
      - run: cd apps/ios && swift build
      - name: Cache Xcode DerivedData
        uses: actions/cache@v4
        with:
          path: ~/Library/Developer/Xcode/DerivedData
          key: ${{ runner.os }}-xcode-dd-ci-${{ hashFiles('apps/ios/**/*.swift', 'apps/ios/project.yml', 'apps/shared/HumanKit/**/*.swift') }}
          restore-keys: |
            ${{ runner.os }}-xcode-dd-
      - uses: ./.github/actions/ios-uitest
        with:
          destination: "platform=iOS Simulator,name=iPhone 16,OS=latest"
          result-bundle-path: apps/ios/TestResults

  build-android:
    needs: changes
    if: >-
      needs.changes.outputs.android == 'true' ||
      needs.changes.outputs.ci == 'true' ||
      github.event_name == 'schedule' ||
      github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with:
          java-version: "17"
          distribution: temurin
      - run: cd apps/android && chmod +x gradlew && ./gradlew assembleDebug
      - name: Android lint + unit tests
        run: cd apps/android && ./gradlew lint test

  build-macos:
    needs: changes
    if: >-
      needs.changes.outputs.macos_app == 'true' ||
      needs.changes.outputs.ci == 'true' ||
      github.event_name == 'schedule' ||
      github.event_name == 'workflow_dispatch'
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6
      - run: cd apps/macos && swift build

  ui:
    needs: changes
    if: >-
      needs.changes.outputs.ui == 'true' ||
      needs.changes.outputs.ci == 'true' ||
      github.event_name == 'schedule' ||
      github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ui
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: ui/package-lock.json
      - run: npm ci
      - run: npm run typecheck
      - run: npm run lint
      - name: Strict lint
        run: npm run lint:strict
      - run: npm run format:check
      - name: Test with coverage
        run: npm run test:coverage
      - name: Token lint (raw hex, rgba, breakpoints)
        run: npm run lint:tokens
      - name: Color lint (full repo)
        run: bash ../scripts/lint-raw-colors.sh --all
      - name: Component quality checklist
        run: npm run check:components
      - name: Unused token audit
        run: bash scripts/check-unused-tokens.sh
      - run: npm run build
      - name: Enforce bundle size budget (300KB)
        run: bash scripts/check-bundle-size.sh
      - name: UI test count regression guard
        run: |
          COUNT=$(npm run test 2>&1 | sed 's/\x1b\[[0-9;]*m//g' | grep -E '^\s*Tests\s' | grep -oE '[0-9]+' | head -1)
          echo "UI test count: $COUNT"
          BASELINE=460
          if [ -n "$COUNT" ] && [ "$COUNT" -lt "$BASELINE" ]; then
            echo "::error::UI test count regression: $COUNT < $BASELINE baseline"
            exit 1
          fi
      - uses: actions/upload-artifact@v7
        with:
          name: ui-dist
          path: dist
          retention-days: 1

  ui-e2e:
    needs: changes
    if: >-
      needs.changes.outputs.ui == 'true' ||
      needs.changes.outputs.c == 'true' ||
      needs.changes.outputs.ci == 'true' ||
      github.event_name == 'schedule' ||
      github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "20"
      - name: Install system deps
        run: sudo apt-get update && sudo apt-get install -y libsqlite3-dev libcurl4-openssl-dev
      - name: Build gateway
        run: |
          cmake -B build -DCMAKE_BUILD_TYPE=Debug -DHU_BUILD_TESTS=OFF -DHU_ENABLE_CURL=ON
          cmake --build build -j$(nproc)
      - name: Install
        run: cd ui && npm ci
      - name: Install Playwright browsers
        run: cd ui && npx playwright install --with-deps chromium
      - name: Build UI
        run: cd ui && npm run build
      - name: Create gateway config
        run: |
          mkdir -p ~/.human
          UI_DIR="$(pwd)/ui/dist"
          cat > ~/.human/config.json << CONF
          {
            "default_provider": "ollama",
            "default_model": "test",
            "gateway": {
              "port": 3000,
              "host": "127.0.0.1",
              "require_pairing": false,
              "control_ui_dir": "${UI_DIR}",
              "rate_limit_requests": 1000,
              "rate_limit_window": 60
            }
          }
          CONF
      - name: Start gateway
        run: |
          nohup ./build/human gateway &>/dev/null &
          for i in $(seq 1 30); do
            curl -sf http://127.0.0.1:3000/health && break
            sleep 1
          done
          curl -sf http://127.0.0.1:3000/health || { echo "::error::Gateway failed to start after 30s"; exit 1; }
      - name: E2E tests (demo mode)
        run: cd ui && npx playwright test --ignore-snapshots --grep-invert "Visual Regression|Smoke"
      - name: E2E smoke tests
        run: cd ui && npx playwright test --config playwright-smoke.config.ts
      - uses: actions/upload-artifact@v7
        if: failure()
        with:
          name: playwright-report
          path: ui/test-results/
          retention-days: 7

  visual-regression:
    needs: changes
    if: >-
      needs.changes.outputs.ui == 'true' ||
      needs.changes.outputs.ci == 'true' ||
      github.event_name == 'schedule' ||
      github.event_name == 'workflow_dispatch'
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: ui/package-lock.json
      - run: cd ui && npm ci
      - run: cd ui && npm run build
      - name: Install Playwright browsers
        run: cd ui && npx playwright install --with-deps chromium
      - name: Visual regression tests
        run: cd ui && npx playwright test visual density
      - uses: actions/upload-artifact@v7
        if: failure()
        with:
          name: visual-regression
          path: |
            ui/test-results/
            ui/playwright-report/
          retention-days: 14

  build-deb:
    needs: changes
    if: >-
      needs.changes.outputs.c == 'true' ||
      needs.changes.outputs.ci == 'true' ||
      github.event_name == 'schedule' ||
      github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake gcc libsqlite3-dev libcurl4-openssl-dev \
            debhelper devscripts fakeroot
      - name: Build .deb package
        run: bash scripts/build-deb.sh
      - name: Verify package
        run: |
          dpkg-deb --info ../*.deb
          dpkg-deb --contents ../*.deb | head -20
      - name: Copy .deb to workspace for artifact upload
        run: cp ../*.deb .
      - uses: actions/upload-artifact@v7
        with:
          name: debian-package
          path: "*.deb"

  completions:
    needs: changes
    if: >-
      needs.changes.outputs.c == 'true' ||
      needs.changes.outputs.ci == 'true' ||
      github.event_name == 'schedule' ||
      github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Verify completions are parseable
        run: bash -n completions/human.bash
      - name: Verify completions cover all subcommands
        run: |
          CMDS=$(grep -oP '\{"[a-z-]+", "' src/main.c | sed 's/{"//;s/", "//' | sort)
          for cmd in $CMDS; do
            grep -q "$cmd" completions/human.bash || { echo "MISSING in bash: $cmd"; exit 1; }
            grep -q "$cmd" completions/_human || { echo "MISSING in zsh: $cmd"; exit 1; }
          done

  local-check:
    needs: changes
    if: >-
      needs.changes.outputs.c == 'true' ||
      needs.changes.outputs.ci == 'true' ||
      github.event_name == 'schedule' ||
      github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libcurl4-openssl-dev libsqlite3-dev
          sudo apt-get install -y clang-format-18 || sudo apt-get install -y clang-format
          if command -v clang-format-18 >/dev/null; then
            sudo ln -sf $(which clang-format-18) /usr/local/bin/clang-format
          fi
      - name: Run scripts/check.sh
        run: HU_SKIP_FORMAT=1 scripts/check.sh

  benchmark:
    needs: changes
    if: >-
      github.ref == 'refs/heads/main' && github.event_name == 'push' &&
      (needs.changes.outputs.c == 'true' || needs.changes.outputs.ci == 'true')
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-build
        with:
          build-type: MinSizeRel
          enable-lto: "true"
          enable-all-channels: "true"
          extra-cmake-flags: -DHU_ENABLE_BENCH=ON
      - name: Run benchmark
        run: scripts/benchmark.sh build/human --save-history
      - name: Run core benchmarks
        run: ./build/human_bench 2>&1 | tee benchmark-core.txt
      - name: Upload benchmark results
        uses: actions/upload-artifact@v7
        with:
          name: benchmark-results
          path: |
            benchmark-results.json
            benchmark-history.json
            benchmark-core.txt
          retention-days: 90

  static-analysis:
    needs: changes
    if: >-
      needs.changes.outputs.c == 'true' ||
      needs.changes.outputs.ci == 'true' ||
      github.event_name == 'schedule' ||
      github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-build
        with:
          enable-curl: "true"
          enable-all-channels: "true"
          extra-apt: clang-tidy
          extra-cmake-flags: -DCMAKE_EXPORT_COMPILE_COMMANDS=ON
      - name: Run clang-tidy on changed files
        run: |
          if [ -n "${GITHUB_BASE_REF:-}" ]; then
            FILES=$(git diff --name-only "origin/$GITHUB_BASE_REF" -- 'src/**/*.c' | head -20)
          else
            FILES=$(find src -name '*.c' -newer CMakeLists.txt | head -20)
          fi
          if [ -n "$FILES" ]; then
            echo "$FILES" | xargs clang-tidy -p build --warnings-as-errors='bugprone-use-after-move,security-*' 2>&1 | tail -30
          else
            echo "No changed C files to analyze"
          fi

  coverage:
    needs: changes
    if: >-
      needs.changes.outputs.c == 'true' ||
      needs.changes.outputs.ci == 'true' ||
      github.event_name == 'schedule' ||
      github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-build
        with:
          enable-curl: "true"
          enable-all-channels: "true"
          enable-coverage: "true"
          extra-apt: lcov
      - uses: ./.github/actions/run-tests
      - name: Generate coverage report
        run: |
          lcov --capture --directory build --output-file coverage.info --ignore-errors mismatch,gcov
          lcov --remove coverage.info '/usr/*' '*/tests/*' '*/vendor/*' --output-file coverage.info --ignore-errors unused
          lcov --list coverage.info | tail -20
      - name: Upload to Codecov
        if: ${{ secrets.CODECOV_TOKEN != '' }}
        uses: codecov/codecov-action@v5
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: coverage.info
          fail_ci_if_error: true
      - uses: actions/upload-artifact@v7
        with:
          name: coverage-report
          path: coverage.info

  docker:
    needs: changes
    if: >-
      needs.changes.outputs.c == 'true' ||
      needs.changes.outputs.docker == 'true' ||
      needs.changes.outputs.ci == 'true' ||
      github.event_name == 'schedule' ||
      github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - run: docker build --target release -t human:ci-test .
      - run: docker run --rm human:ci-test --version

  website:
    needs: changes
    if: >-
      needs.changes.outputs.website == 'true' ||
      needs.changes.outputs.ci == 'true' ||
      github.event_name == 'schedule' ||
      github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: |
            design-tokens/package-lock.json
            website/package-lock.json
      - run: cd design-tokens && npm ci --ignore-scripts
      - run: cd design-tokens && npm run build
      - run: cd website && npm ci
      - run: cd website && npm run format:check
      - run: cd website && npm run check
      - run: cd website && npm run build
      - run: test -d website/dist
      - uses: actions/upload-artifact@v7
        with:
          name: website-dist
          path: website/dist
          retention-days: 1

  lighthouse:
    runs-on: ubuntu-latest
    needs: [changes, website]
    if: >-
      needs.changes.outputs.website == 'true' ||
      needs.changes.outputs.ci == 'true' ||
      github.event_name == 'schedule' ||
      github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v6
      - uses: actions/download-artifact@v4
        with:
          name: website-dist
          path: website/dist
      - name: Lighthouse CI (desktop)
        uses: treosh/lighthouse-ci-action@v12
        with:
          uploadArtifacts: true
          temporaryPublicStorage: true
          configPath: website/.lighthouserc.json
          artifactName: lighthouse-website-desktop
      - name: Lighthouse CI (mobile)
        uses: treosh/lighthouse-ci-action@v12
        with:
          uploadArtifacts: true
          temporaryPublicStorage: true
          configPath: website/.lighthouserc-mobile.json
          artifactName: lighthouse-website-mobile

  lighthouse-dashboard:
    runs-on: ubuntu-latest
    needs: [changes, ui]
    if: >-
      needs.changes.outputs.ui == 'true' ||
      needs.changes.outputs.ci == 'true' ||
      github.event_name == 'schedule' ||
      github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v6
      - uses: actions/download-artifact@v4
        with:
          name: ui-dist
          path: ui/dist
      - name: Lighthouse CI (Dashboard)
        uses: treosh/lighthouse-ci-action@v12
        with:
          uploadArtifacts: true
          temporaryPublicStorage: true
          configPath: .lighthouserc-dashboard.json
          artifactName: lighthouse-dashboard

  design-tokens:
    needs: changes
    if: >-
      needs.changes.outputs.website == 'true' ||
      needs.changes.outputs.ui == 'true' ||
      needs.changes.outputs.ci == 'true' ||
      github.event_name == 'schedule' ||
      github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: design-tokens/package-lock.json
      - run: cd design-tokens && npm ci && npm run build -- --outdir /tmp/dt-check
      - run: bash design-tokens/check-drift.sh

  nix:
    needs: changes
    if: >-
      needs.changes.outputs.nix == 'true' ||
      needs.changes.outputs.c == 'true' ||
      needs.changes.outputs.ci == 'true' ||
      github.event_name == 'schedule' ||
      github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: cachix/install-nix-action@v31
        with:
          nix_path: nixpkgs=channel:nixpkgs-unstable
      - run: nix build --no-link --print-build-logs
      - run: nix flake check

  ollama-integration:
    needs: changes
    if: >-
      github.ref == 'refs/heads/main' &&
      (needs.changes.outputs.c == 'true' || needs.changes.outputs.ci == 'true')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y libsqlite3-dev libcurl4-openssl-dev
      - name: Install Ollama
        run: curl -fsSL https://ollama.com/install.sh | sh
      - name: Start Ollama server
        run: nohup ollama serve &>/dev/null &
      - name: Wait for Ollama
        run: |
          for i in $(seq 1 30); do
            curl -sf http://localhost:11434/api/version && break || sleep 1
          done
      - name: Pull tinyllama
        run: ollama pull tinyllama
      - name: Build
        run: |
          cmake -B build -DHU_ENABLE_ALL_CHANNELS=ON -DHU_ENABLE_CURL=ON
          cmake --build build -j$(nproc)
      - name: Run integration tests
        run: ./build/human_tests

  docs:
    needs: changes
    if: >-
      needs.changes.outputs.docs == 'true' ||
      needs.changes.outputs.ci == 'true' ||
      github.event_name == 'schedule' ||
      github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Check for stale branding
        run: |
          if grep -ri "nullclaw" docs/ skills/ sdk/ --include='*.md' -l 2>/dev/null | grep -v plans/; then
            echo "Found 'NullClaw' references — update to 'Human'"
            exit 1
          fi
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
      - name: Check generated docs are up to date
        run: |
          cd ui && npm ci --ignore-scripts
          npm run docs 2>/dev/null || true
          cd ..
          if ! git diff --exit-code docs/icon-inventory.md docs/components.md 2>/dev/null; then
            echo "::warning::Generated docs are stale. Run 'cd ui && npm run docs' to update."
          fi
      - name: Doc fleet (index, drift, terminology, frontmatter, relative links)
        run: scripts/doc-fleet.sh

  quality-score:
    if: >-
      github.event_name != 'schedule' && github.event_name != 'workflow_dispatch' &&
      (needs.changes.outputs.c == 'true' || needs.changes.outputs.ui == 'true' || needs.changes.outputs.ci == 'true')
    runs-on: ubuntu-latest
    needs: [changes, build-and-test, ui]
    steps:
      - uses: actions/checkout@v6
      - name: Install build deps
        run: sudo apt-get update && sudo apt-get install -y libsqlite3-dev libcurl4-openssl-dev
      - name: Build
        run: |
          cmake -B build -DHU_ENABLE_ALL_CHANNELS=ON -DHU_ENABLE_SQLITE=ON -DHU_ENABLE_PERSONA=ON -DHU_ENABLE_SKILLS=ON
          cmake --build build -j$(nproc)
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
      - name: Install UI deps
        run: cd ui && npm ci --ignore-scripts
      - name: Quality score report
        env:
          QUALITY_GATE_PCT: "80"
        run: bash scripts/quality-score-report.sh

  quality-score-scheduled:
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq
      - name: Run competitive benchmark
        env:
          PAGESPEED_API_KEY: ${{ secrets.PAGESPEED_API_KEY }}
        run: bash scripts/benchmark-competitive.sh --human-only --markdown
      - name: Quality scorecard summary
        run: |
          echo "=== Quality Scorecard ==="
          echo "Dashboard: Lighthouse ✓, Visual Regression ✓, A11y ✓, Token Lint ✓"
          echo "Website: Lighthouse ✓, Build ✓"
          echo "iOS: Build ✓"
          echo "Android: Build ✓"
          if [ -f benchmark-competitive.json ]; then
            echo ""
            echo "=== Competitive Benchmark (Human) ==="
            jq -r '.[] | select(.name == "Human") | "Perf: \(.performance // "—") | A11y: \(.accessibility // "—") | BP: \(.best_practices // "—") | SEO: \(.seo // "—") | LCP: \(.lcp_ms // "—")ms | CLS: \(.cls // "—")"' benchmark-competitive.json 2>/dev/null || true
          fi
      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: quality-score-scheduled
          path: |
            benchmark-competitive.json
            docs/competitive-benchmarks-latest.md
          retention-days: 90

  ci-summary:
    if: always()
    needs: [build-and-test, ui, coverage, release-size, website]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/download-artifact@v4
        with:
          name: coverage-report
          path: /tmp/ci-artifacts
        continue-on-error: true
      - name: Write CI summary
        run: |
          {
            echo "## CI Summary"
            echo ""
            echo "| Metric | Value |"
            echo "|--------|-------|"

            echo "| Build & Test | ${{ needs.build-and-test.result }} |"
            echo "| UI | ${{ needs.ui.result }} |"
            echo "| Coverage | ${{ needs.coverage.result }} |"
            echo "| Release Size | ${{ needs.release-size.result }} |"
            echo "| Website | ${{ needs.website.result }} |"

            if [ -f /tmp/ci-artifacts/coverage.info ]; then
              COV_PCT=$(lcov --summary /tmp/ci-artifacts/coverage.info 2>&1 | grep -oP 'lines\.*: \K[0-9.]+' || echo "N/A")
              echo "| Line Coverage | ${COV_PCT}% |"
            fi

            echo ""
            echo "*Generated at $(date -u '+%Y-%m-%d %H:%M UTC')*"
          } >> "$GITHUB_STEP_SUMMARY"

  fuzz:
    needs: changes
    if: >-
      github.ref == 'refs/heads/main' && github.event_name == 'push' &&
      (needs.changes.outputs.c == 'true' || needs.changes.outputs.ci == 'true')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install Clang and build deps
        run: sudo apt-get update && sudo apt-get install -y clang libsqlite3-dev
      - name: Configure (fuzz)
        env:
          CC: clang
          CXX: clang++
        run: |
          cmake -B build-fuzz \
            -DCMAKE_C_COMPILER=clang \
            -DCMAKE_CXX_COMPILER=clang++ \
            -DHU_ENABLE_FUZZ=ON \
            -DHU_ENABLE_ALL_CHANNELS=ON
      - name: Build (fuzz)
        run: cmake --build build-fuzz -j$(nproc)
      - name: Run fuzz harnesses
        run: |
          FUZZ_FAIL=0
          mkdir -p fuzz/corpus/url
          for harness in \
            "fuzz_json_parse fuzz/corpus/json" \
            "fuzz_config_load fuzz/corpus/config" \
            "fuzz_tool_params" \
            "fuzz_base64" \
            "fuzz_json fuzz/corpus/json" \
            "fuzz_config fuzz/corpus/config" \
            "fuzz_url_encode fuzz/corpus/url" \
            "fuzz_persona_json" \
            "fuzz_persona_parse" \
            "fuzz_graph" \
            "fuzz_fast_capture" \
            "fuzz_sse" \
            "fuzz_http_parse" \
            "fuzz_prompt_injection" \
            "fuzz_visual_grounding" \
            "fuzz_ensemble_rerank" \
            "fuzz_contact_phone" \
            "fuzz_twilio_webhook"; do
            NAME=$(echo "$harness" | cut -d' ' -f1)
            echo "--- Running $NAME ---"
            if ! ./build-fuzz/$harness -max_total_time=30 -print_final_stats=1; then
              echo "::error::Fuzz harness $NAME found a crash"
              FUZZ_FAIL=1
            fi
          done
          if [ "$FUZZ_FAIL" -ne 0 ]; then
            echo "::error::One or more fuzz harnesses found crashes"
            exit 1
          fi
