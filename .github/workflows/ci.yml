name: SeaClaw CI

on: [push, pull_request]

jobs:
  build-and-test:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libsqlite3-dev libcurl4-openssl-dev

      - name: Install dependencies (macOS)
        if: runner.os == 'macOS'
        run: brew install sqlite3

      - name: Build (Linux)
        if: runner.os == 'Linux'
        run: |
          mkdir -p build && cd build
          cmake .. -DCMAKE_BUILD_TYPE=Debug -DSC_ENABLE_ALL_CHANNELS=ON -DSC_ENABLE_CURL=ON -DSC_ENABLE_ASAN=ON
          cmake --build . -j$(nproc 2>/dev/null || sysctl -n hw.logicalcpu)

      - name: Build (macOS)
        if: runner.os == 'macOS'
        run: |
          mkdir -p build && cd build
          cmake .. -DCMAKE_BUILD_TYPE=Debug -DSC_ENABLE_ALL_CHANNELS=ON -DSC_ENABLE_ASAN=ON
          cmake --build . -j$(nproc 2>/dev/null || sysctl -n hw.logicalcpu)

      - name: Test (Linux)
        if: runner.os == 'Linux'
        run: cd build && ASAN_OPTIONS=detect_leaks=0:detect_stack_use_after_return=0 ./seaclaw_tests

      - name: Test (macOS)
        if: runner.os == 'macOS'
        run: cd build && ./seaclaw_tests

  release-size:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - run: brew install sqlite3
      - run: |
          mkdir -p build && cd build
          cmake .. -DCMAKE_BUILD_TYPE=MinSizeRel -DSC_ENABLE_LTO=ON -DSC_ENABLE_ALL_CHANNELS=ON
          cmake --build . -j$(nproc 2>/dev/null || sysctl -n hw.logicalcpu)
      - run: ls -lh build/seaclaw
      - run: |
          SIZE=$(stat -f%z build/seaclaw)
          if [ "$SIZE" -gt 512000 ]; then
            echo "Binary size $SIZE bytes exceeds 500KB (512000 bytes)"
            exit 1
          fi

  build-ios:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - run: cd apps/ios && swift build

  build-android:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: temurin
      - run: cd apps/android && chmod +x gradlew && ./gradlew assembleDebug

  ui:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ui
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: ui/package-lock.json
      - run: npm ci
      - run: npm run typecheck
      - run: npm run lint
      - run: npm run format:check
      - run: npm run test
      - run: npm run build

  completions:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Verify completions are parseable
        run: |
          bash -n completions/seaclaw.bash
          echo "bash completions: OK"
      - name: Verify completions cover all subcommands
        run: |
          CMDS=$(grep -oP '\{"[a-z-]+", "' src/main.c | sed 's/{"//;s/", "//' | sort)
          for cmd in $CMDS; do
            if ! grep -q "$cmd" completions/seaclaw.bash; then
              echo "MISSING in bash completions: $cmd"
              exit 1
            fi
            if ! grep -q "$cmd" completions/seaclaw.zsh; then
              echo "MISSING in zsh completions: $cmd"
              exit 1
            fi
          done
          echo "All subcommands covered in completions"

  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker image
        run: docker build --target release -t seaclaw:ci-test .
      - name: Verify binary runs in container
        run: docker run --rm seaclaw:ci-test --version

  website:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: website/package-lock.json
      - run: cd website && npm ci && npm run build
      - name: Verify dist exists
        run: test -d website/dist

  nix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: cachix/install-nix-action@v30
        with:
          nix_path: nixpkgs=channel:nixpkgs-unstable
      - run: nix build --no-link --print-build-logs
      - run: nix flake check
