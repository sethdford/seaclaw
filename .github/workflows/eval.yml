name: Agent Evaluation

on:
  pull_request:
    paths:
      - "src/**"
      - "include/**"
      - "eval_suites/**"
  schedule:
    - cron: "0 6 * * 1"
  workflow_dispatch:
    inputs:
      golden_set:
        description: "Path to golden set file"
        default: "data/eval/golden_set.jsonl"

jobs:
  eval-suites:
    name: Run eval suites
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - uses: ./.github/actions/setup-build
        with:
          build-type: Debug
          enable-curl: "true"

      - name: Run eval suite tests (includes regression detection)
        run: ./build/human_tests --suite="Evaluation" --suite="eval_runner" --suite="eval_bench" --suite="Eval History"

      - name: Run sample eval suites (fail on regression)
        run: |
          ./build/human eval list
          for suite in eval_suites/*.json; do
            echo "=== Running $suite ==="
            ./build/human eval run "$suite" --fail-on-regression
          done

  golden-set:
    name: Golden-set evaluation
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - uses: ./.github/actions/setup-build
        with:
          build-type: Debug
          enable-curl: "true"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run golden-set evaluation
        env:
          GEMINI_EVAL_KEY: ${{ secrets.GEMINI_EVAL_KEY }}
          GOLDEN_SET_PATH: ${{ github.event.inputs.golden_set || 'data/eval/golden_set.jsonl' }}
        run: |
          python3 scripts/eval_golden_set.py \
            --binary ./build/human \
            --golden-set "$GOLDEN_SET_PATH" \
            --output eval_results.json

      - name: Upload results
        uses: actions/upload-artifact@v4
        with:
          name: eval-results
          path: eval_results.json

      - name: Check for regression
        run: python3 scripts/eval_check_regression.py --results eval_results.json

  stretch-goals:
    name: Stretch goal metrics
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - uses: ./.github/actions/setup-build
        with:
          build-type: Debug
          enable-curl: "true"

      - name: Run convergence metric suites
        run: |
          echo "=== Eval improvement ==="
          ./build/human_tests --filter=eval_improvement
          echo "=== Self-improve evidence ==="
          ./build/human_tests --filter=self_improve_produces
          echo "=== Intrinsic goal generation ==="
          ./build/human_tests --filter=intrinsic_goal
          echo "=== Voice latency target ==="
          ./build/human_tests --filter=latency_under
          echo "=== Sandbox cold start ==="
          ./build/human_tests --filter=sandbox_cold
          echo "=== Swarm execution ==="
          ./build/human_tests --suite=swarm
          echo "=== Skill composition ==="
          ./build/human_tests --filter=skill_compose
          echo "=== Memory graph ==="
          ./build/human_tests --suite=memory_graph
          echo "=== Training data collection ==="
          ./build/human_tests --filter=training_collector

      - name: Report stretch goal status
        run: |
          echo "## Stretch Goal Tracking ($(date -u +%Y-%m-%d))"
          echo ""
          echo "| Goal | Target | Status |"
          echo "|------|--------|--------|"
          echo "| GAIA >60% | Requires live model | Infra ready |"
          echo "| Self-improve >10%/cycle | Test harness passing | Infra ready |"
          echo "| Swarm >3x speedup | Requires parallel benchmark | Infra ready |"
          echo "| Voice <100ms first-byte | Currently 150ms simulated | On track |"
          echo "| Memory F1 >15% | Requires retrieval benchmark | Infra ready |"
          echo "| RL learning signal | Training collector operational | Infra ready |"
          echo "| GUI 5-step workflow | Requires real application | Infra ready |"
