name: Setup and Build Human
description: Install dependencies, configure, and build Human

inputs:
  build-type:
    description: CMake build type (Debug, MinSizeRel)
    default: Debug
  build-dir:
    description: Build directory name
    default: build
  enable-asan:
    description: Enable AddressSanitizer
    default: "false"
  enable-curl:
    description: Enable libcurl HTTP client
    default: "false"
  enable-all-channels:
    description: Enable all channel implementations
    default: "false"
  enable-lto:
    description: Enable link-time optimization
    default: "false"
  enable-coverage:
    description: Enable gcov coverage instrumentation
    default: "false"
  enable-fuzz:
    description: Enable fuzzing builds (requires clang)
    default: "false"
  extra-apt:
    description: Additional apt packages to install
    default: ""
  target:
    description: CMake build target (empty for all)
    default: ""
  enable-update:
    description: Enable self-update support
    default: "false"
  extra-cmake-flags:
    description: Additional CMake flags
    default: ""

runs:
  using: composite
  steps:
    - name: Install dependencies (Linux)
      if: runner.os == 'Linux'
      shell: bash
      run: |
        sudo apt-get update
        PKGS="libsqlite3-dev"
        if [ "${{ inputs.enable-curl }}" = "true" ]; then PKGS="$PKGS libcurl4-openssl-dev"; fi
        if [ -n "${{ inputs.extra-apt }}" ]; then PKGS="$PKGS ${{ inputs.extra-apt }}"; fi
        sudo apt-get install -y $PKGS

    - name: Install dependencies (macOS)
      if: runner.os == 'macOS'
      shell: bash
      run: brew install sqlite3

    - name: Configure
      shell: bash
      run: |
        if [ "${{ runner.os }}" = "macOS" ]; then
          export PATH="/opt/homebrew/bin:/usr/local/bin:$PATH"
        fi
        mkdir -p ${{ inputs.build-dir }} && cd ${{ inputs.build-dir }}
        rm -f CMakeCache.txt
        CMAKE_FLAGS="-DCMAKE_BUILD_TYPE=${{ inputs.build-type }}"
        if [ "${{ inputs.enable-asan }}" = "true" ]; then CMAKE_FLAGS="$CMAKE_FLAGS -DHU_ENABLE_ASAN=ON"; fi
        if [ "${{ inputs.enable-curl }}" = "true" ]; then CMAKE_FLAGS="$CMAKE_FLAGS -DHU_ENABLE_CURL=ON"; fi
        if [ "${{ inputs.enable-all-channels }}" = "true" ]; then CMAKE_FLAGS="$CMAKE_FLAGS -DHU_ENABLE_ALL_CHANNELS=ON"; fi
        if [ "${{ inputs.enable-lto }}" = "true" ]; then CMAKE_FLAGS="$CMAKE_FLAGS -DHU_ENABLE_LTO=ON"; fi
        if [ "${{ inputs.enable-fuzz }}" = "true" ]; then CMAKE_FLAGS="$CMAKE_FLAGS -DHU_ENABLE_FUZZ=ON"; fi
        if [ "${{ inputs.enable-update }}" = "true" ]; then CMAKE_FLAGS="$CMAKE_FLAGS -DHU_ENABLE_UPDATE=ON"; fi
        if [ "${{ inputs.enable-coverage }}" = "true" ]; then
          CMAKE_FLAGS="$CMAKE_FLAGS -DCMAKE_C_FLAGS=--coverage"
        fi
        if [ -n "${{ inputs.extra-cmake-flags }}" ]; then CMAKE_FLAGS="$CMAKE_FLAGS ${{ inputs.extra-cmake-flags }}"; fi
        cmake .. $CMAKE_FLAGS

    - name: Build
      shell: bash
      run: |
        TARGET_FLAG=""
        if [ -n "${{ inputs.target }}" ]; then TARGET_FLAG="--target ${{ inputs.target }}"; fi
        cmake --build ${{ inputs.build-dir }} $TARGET_FLAG -j$(nproc 2>/dev/null || sysctl -n hw.logicalcpu)
