name: HumaniOS
options:
  bundleIdPrefix: ai.human
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"
  groupSortPosition: top

packages:
  HumanKit:
    path: ../shared/HumanKit

targets:
  HumaniOS:
    type: application
    platform: iOS
    sources:
      - Sources/HumaniOS
    resources:
      - Sources/HumaniOS/Resources
    dependencies:
      - package: HumanKit
        product: HumanClient
      - package: HumanKit
        product: HumanChatUI
      - package: HumanKit
        product: HumanProtocol
      - target: HumanWidgetExtension
        embed: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: ai.human.ios
        MARKETING_VERSION: "1.1.0"
        CURRENT_PROJECT_VERSION: "2"
        SWIFT_VERSION: "5.9"
        INFOPLIST_FILE: Sources/HumaniOS/Resources/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        GENERATE_INFOPLIST_FILE: false
    info:
      path: Sources/HumaniOS/Resources/Info.plist

  HumanWidgetExtension:
    type: app-extension
    platform: iOS
    sources:
      - Sources/HumanWidgetExtension
    dependencies:
      - package: HumanKit
        product: HumanChatUI
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: ai.human.ios.widget
        MARKETING_VERSION: "1.1.0"
        CURRENT_PROJECT_VERSION: "2"
        SWIFT_VERSION: "5.9"
        INFOPLIST_FILE: Sources/HumanWidgetExtension/Info.plist
        GENERATE_INFOPLIST_FILE: false

  HumaniOSUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - UITests
    dependencies:
      - target: HumaniOS
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: ai.human.ios.uitests
        SWIFT_VERSION: "5.9"
        TEST_TARGET_NAME: HumaniOS
        CODE_SIGNING_ALLOWED: NO
