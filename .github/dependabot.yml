version: 2

updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    groups:
      actions:
        patterns: ["*"]

  - package-ecosystem: npm
    directory: /website
    schedule:
      interval: weekly
    groups:
      website-deps:
        patterns: ["*"]

  - package-ecosystem: npm
    directory: /ui
    schedule:
      interval: weekly
    groups:
      ui-deps:
        patterns: ["*"]

  - package-ecosystem: npm
    directory: /design-tokens
    schedule:
      interval: weekly
    groups:
      design-tokens-deps:
        patterns: ["*"]

  - package-ecosystem: swift
    directory: /apps/shared/HumanKit
    schedule:
      interval: weekly
    groups:
      humankit-deps:
        patterns: ["*"]

  - package-ecosystem: swift
    directory: /apps/ios
    schedule:
      interval: weekly
    groups:
      ios-deps:
        patterns: ["*"]

  - package-ecosystem: swift
    directory: /apps/macos
    schedule:
      interval: weekly
    groups:
      macos-deps:
        patterns: ["*"]

  - package-ecosystem: gradle
    directory: /apps/android
    schedule:
      interval: weekly
    groups:
      android-deps:
        patterns: ["*"]
