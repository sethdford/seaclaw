<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="SeaClaw Control — AI assistant dashboard" />
    <meta name="theme-color" content="#0c0c0c" media="(prefers-color-scheme: dark)" />
    <meta name="theme-color" content="#fafafa" media="(prefers-color-scheme: light)" />
    <link rel="icon" type="image/svg+xml" href="/src/assets/logo.svg" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <title>SeaClaw Control</title>
  </head>
  <body>
    <!-- Skip link is rendered inside sc-app's shadow DOM to reach <main> -->
    <svg class="sc-glass-refraction-svg" aria-hidden="true" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <filter id="sc-refract" x="0" y="0" width="100%" height="100%">
          <feTurbulence
            type="fractalNoise"
            baseFrequency="0.015"
            numOctaves="3"
            seed="2"
            result="noise"
          />
          <feDisplacementMap
            in="SourceGraphic"
            in2="noise"
            scale="3"
            xChannelSelector="R"
            yChannelSelector="G"
          />
        </filter>
      </defs>
    </svg>
    <sc-app></sc-app>
    <script type="module" src="/src/main.ts"></script>
    <script>
      if ("serviceWorker" in navigator) {
        navigator.serviceWorker.register("/sw.js").catch(() => {});
      }
    </script>
  </body>
</html>
