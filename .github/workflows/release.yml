name: Release

on:
  push:
    tags: ["v*"]

jobs:
  build:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        shell: bash
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: linux-x86_64
          - os: macos-latest
            target: macos-aarch64

    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-build
        with:
          build-type: MinSizeRel
          enable-lto: "true"
          enable-curl: "true"
          enable-all-channels: "true"
          target: seaclaw

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: seaclaw-${{ matrix.target }}
          path: build/seaclaw

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/download-artifact@v8

      - uses: actions/checkout@v6
        with:
          sparse-checkout: |
            completions
            docs/man
            install.sh
            LICENSE

      - name: Rename binaries
        run: |
          mv seaclaw-linux-x86_64/seaclaw seaclaw-linux-x86_64.bin
          mv seaclaw-macos-aarch64/seaclaw seaclaw-macos-aarch64.bin
          chmod +x seaclaw-linux-x86_64.bin seaclaw-macos-aarch64.bin

      - name: Package completions and man pages
        run: tar czf seaclaw-extras.tar.gz completions/ docs/man/ install.sh LICENSE

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            seaclaw-linux-x86_64.bin
            seaclaw-macos-aarch64.bin
            seaclaw-extras.tar.gz
            install.sh
          generate_release_notes: true

  docker:
    needs: release
    runs-on: ubuntu-latest
    continue-on-error: true
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v6

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=semver,pattern={{raw}}
            type=raw,value=latest

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
