name: Stale Issues and PRs

on:
  schedule:
    - cron: "0 9 * * *"
  workflow_dispatch:

permissions:
  issues: write
  pull-requests: write

jobs:
  stale:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/stale@v10
        with:
          stale-issue-message: |
            This issue has been idle for 60 days. It will be closed in 14 days
            unless there is new activity. Add the keep-open label to prevent
            automatic closure.
          stale-pr-message: |
            This PR has been idle for 30 days. It will be closed in 14 days
            unless there is new activity.
          stale-issue-label: stale
          stale-pr-label: stale
          exempt-issue-labels: keep-open,bug,security
          exempt-pr-labels: keep-open
          days-before-issue-stale: 60
          days-before-pr-stale: 30
          days-before-issue-close: 14
          days-before-pr-close: 14
